<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#fb923c" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="360" height="220" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>

  <text x="180" y="20" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" font-weight="bold">কোষ প্রাচীরের স্তর — Cell Wall Layers</text>

  <!-- Cell wall as rectangular layers -->
  <!-- Middle lamella (outermost) -->
  <rect x="70" y="35" width="220" height="150" rx="10" fill="none" stroke="#a78bfa" stroke-width="2.5" filter="url(#glow)"/>
  <text x="300" y="76" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="7">মধ্যপর্দা</text>
  <text x="300" y="83" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="6">(Middle Lamella)</text>

  <!-- Primary wall -->
  <rect x="88" y="48" width="184" height="124" rx="8" fill="none" stroke="#34d399" stroke-width="2.5"/>
  <text x="306" y="108" fill="#86efac" font-family="system-ui,sans-serif" font-size="7">প্রাথমিক</text>
  <text x="306" y="115" fill="#86efac" font-family="system-ui,sans-serif" font-size="6">প্রাচীর</text>

  <!-- Secondary wall -->
  <rect x="105" y="60" width="150" height="100" rx="6" fill="none" stroke="#f472b6" stroke-width="2.5" filter="url(#glow)"/>
  <text x="306" y="142" fill="#fda4af" font-family="system-ui,sans-serif" font-size="7">গৌণ</text>
  <text x="306" y="149" fill="#fda4af" font-family="system-ui,sans-serif" font-size="6">প্রাচীর</text>

  <!-- Plasma membrane (innermost) -->
  <rect x="118" y="72" width="124" height="76" rx="4" fill="none" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="306" y="175" fill="#fde68a" font-family="system-ui,sans-serif" font-size="7">প্লাজমা</text>
  <text x="306" y="182" fill="#fde68a" font-family="system-ui,sans-serif" font-size="6">ঝিল্লি</text>

  <!-- Inside cell (cytoplasm) -->
  <rect x="124" y="78" width="112" height="64" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <ellipse cx="180" cy="110" rx="25" ry="16" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <ellipse cx="180" cy="110" rx="12" ry="8" fill="none" stroke="#fde68a" stroke-width="1"/>
  <text x="200" y="112" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="6">নিউক্লিয়াস</text>

  <!-- Plasmodesmata -->
  <line x1="130" y1="48" x2="130" y2="60" stroke="#fb923c" stroke-width="2"/>
  <line x1="180" y1="48" x2="180" y2="60" stroke="#fb923c" stroke-width="2"/>
  <line x1="230" y1="48" x2="230" y2="60" stroke="#fb923c" stroke-width="2"/>
  <text x="178" y="48" fill="#fdba74" font-family="system-ui,sans-serif" font-size="6">↑ প্লাজমোডেসমাটা</text>

  <!-- Pectin (in middle lamella) -->
  <text x="160" y="192" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="7" text-anchor="middle">পেকটিন (মধ্যপর্দায়)</text>

  <text x="180" y="212" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">উদ্ভিদ কোষ প্রাচীরের স্তরবিন্যাস</text>
</svg>