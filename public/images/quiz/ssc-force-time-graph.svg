<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/>
    </marker>
    <style>
      .axis { stroke:#0f172a; stroke-width:3.5; marker-end:url(#arrow); }
      .grid { stroke:#fde68a; stroke-width:1.5; }
      .line { fill:none; stroke:#f97316; stroke-width:6; stroke-linecap:round; }
      .dot { fill:#2563eb; stroke:#ffffff; stroke-width:4; }
      .label { font-family:Arial,"Noto Sans Bengali",sans-serif; font-size:23px; font-weight:800; fill:#0f172a; }
      .small { font-family:Arial,"Noto Sans Bengali",sans-serif; font-size:19px; font-weight:700; fill:#334155; }
    </style>
  </defs>
  <rect width="900" height="520" rx="26" fill="url(#bg)"/>
  <rect x="38" y="38" width="824" height="444" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <line x1="120" y1="420" x2="790" y2="420" class="axis"/>
  <line x1="120" y1="420" x2="120" y2="80" class="axis"/>
  <line x1="260" y1="420" x2="260" y2="90" class="grid"/>
  <line x1="400" y1="420" x2="400" y2="90" class="grid"/>
  <line x1="540" y1="420" x2="540" y2="90" class="grid"/>
  <line x1="680" y1="420" x2="680" y2="90" class="grid"/>
  <line x1="120" y1="330" x2="780" y2="330" class="grid"/>
  <line x1="120" y1="240" x2="780" y2="240" class="grid"/>
  <line x1="120" y1="150" x2="780" y2="150" class="grid"/>
  <line x1="145" y1="390" x2="710" y2="125" class="line"/>
  <circle cx="145" cy="390" r="8" class="dot"/>
  <circle cx="710" cy="125" r="8" class="dot"/>
  <text x="775" y="455" class="label">t (s)</text>
  <text x="66" y="95" class="label">F (N)</text>
</svg>
