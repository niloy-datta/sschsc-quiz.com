<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/>
    </marker>
    <style>
      .axis { stroke:#0f172a; stroke-width:3.5; marker-end:url(#arrow); }
      .grid { stroke:#dbeafe; stroke-width:1.5; }
      .line { fill:none; stroke:#2563eb; stroke-width:6; stroke-linejoin:round; stroke-linecap:round; }
      .dot { fill:#ef4444; stroke:#ffffff; stroke-width:4; }
      .label { font-family:Arial,"Noto Sans Bengali",sans-serif; font-size:23px; font-weight:800; fill:#0f172a; }
      .small { font-family:Arial,"Noto Sans Bengali",sans-serif; font-size:18px; font-weight:700; fill:#334155; }
    </style>
  </defs>
  <rect width="900" height="520" rx="26" fill="url(#bg)"/>
  <rect x="38" y="38" width="824" height="444" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <line x1="120" y1="420" x2="790" y2="420" class="axis"/>
  <line x1="120" y1="420" x2="120" y2="80" class="axis"/>
  <line x1="320" y1="420" x2="320" y2="90" class="grid"/>
  <line x1="520" y1="420" x2="520" y2="90" class="grid"/>
  <line x1="720" y1="420" x2="720" y2="90" class="grid"/>
  <line x1="120" y1="250" x2="780" y2="250" class="grid"/>
  <line x1="120" y1="80" x2="780" y2="80" class="grid"/>
  <polyline points="120,420 320,250 520,250 720,80" class="line"/>
  <circle cx="120" cy="420" r="8" class="dot"/>
  <circle cx="320" cy="250" r="8" class="dot"/>
  <circle cx="520" cy="250" r="8" class="dot"/>
  <circle cx="720" cy="80" r="8" class="dot"/>
  <text x="88" y="448" class="small">O(0,0)</text>
  <text x="275" y="232" class="small">A(10,10)</text>
  <text x="475" y="232" class="small">B(20,10)</text>
  <text x="675" y="66" class="small">C(30,20)</text>
  <text x="778" y="455" class="label">t (s)</text>
  <text x="62" y="95" class="label">s (m)</text>
  <text x="312" y="455" class="small">10</text>
  <text x="512" y="455" class="small">20</text>
  <text x="712" y="455" class="small">30</text>
  <text x="82" y="256" class="small">10</text>
  <text x="82" y="86" class="small">20</text>
</svg>
