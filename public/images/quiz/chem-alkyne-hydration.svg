  <text x="210" y="89" text-anchor="middle" font-size="11" fill="#2563eb">H₂SO₄ / HgSO₄, 80°C</text>
  <text x="312" y="108" text-anchor="middle" font-size="14" fill="#0f172a">CH₃CH₂CHO</text>
  <line x1="210" y1="135" x2="210" y2="180" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="242" y="162" font-size="11" fill="#ea580c">[O]</text>
  <text x="210" y="205" text-anchor="middle" font-size="14" fill="#0f172a">B: CH₃CH₂COOH</text>

