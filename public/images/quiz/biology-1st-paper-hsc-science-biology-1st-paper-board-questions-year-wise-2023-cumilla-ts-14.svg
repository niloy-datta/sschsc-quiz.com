<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220" role="img" aria-label="biology 1st paper hsc science biology 1st paper board questions year wise 2023 cumilla ts 14">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <radialGradient id="bundleA" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>

    <radialGradient id="bundleB" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </radialGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000000" flood-opacity=".45"/>
    </filter>

    <style>
      .outer{fill:#052e16;stroke:#86efac;stroke-width:2;filter:url(#shadow)}
      .a{fill:url(#bundleA);stroke:#dcfce7;stroke-width:2}
      .b{fill:url(#bundleB);stroke:#dbeafe;stroke-width:2}
      .xylem{fill:#facc15;stroke:#fef3c7;stroke-width:1.5}
      .label{font-family:Arial,sans-serif;font-size:20px;font-weight:900;fill:#e5e7eb}
    </style>
  </defs>

  <rect width="360" height="220" rx="18" fill="url(#bg)"/>

  <ellipse cx="112" cy="112" rx="70" ry="58" class="outer"/>
  <ellipse cx="248" cy="112" rx="70" ry="58" class="outer"/>

  <ellipse cx="112" cy="112" rx="46" ry="35" class="a"/>
  <ellipse cx="248" cy="112" rx="46" ry="35" class="b"/>

  <circle cx="112" cy="112" r="18" class="xylem"/>
  <circle cx="236" cy="112" r="13" class="xylem"/>
  <circle cx="260" cy="112" r="13" class="xylem"/>

  <text x="112" y="52" text-anchor="middle" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">A</text>
  <text x="248" y="52" text-anchor="middle" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">B</text>
</svg>
