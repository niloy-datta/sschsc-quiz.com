<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220" role="img" aria-label="chemistry ssc science chemistry board questions year wise 2025 cumilla ts 10">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <style>
      .layer{stroke:#94a3b8;stroke-width:3;stroke-linecap:round}
      .electron{fill:#38bdf8;stroke:#e0f2fe;stroke-width:1.5}
      .flow{stroke:#38bdf8;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .metal{fill:#facc15;stroke:#fff7ed;stroke-width:2}
      .label{font-family:Arial,sans-serif;font-size:13px;font-weight:800;fill:#fff}
    </style>
  </defs>

  <rect width="360" height="220" rx="18" fill="url(#bg)"/>

  <g transform="translate(45 42)">
    <line x1="0" y1="30" x2="130" y2="30" class="layer"/>
    <line x1="0" y1="60" x2="130" y2="60" class="layer"/>
    <line x1="0" y1="90" x2="130" y2="90" class="layer"/>
    <circle cx="20" cy="30" r="6" class="electron"/>
    <circle cx="65" cy="60" r="6" class="electron"/>
    <circle cx="105" cy="90" r="6" class="electron"/>
    <path d="M20 30 C55 12 92 14 122 30" class="flow"/>
    <text x="65" y="135" text-anchor="middle" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">Graphite</text>
  </g>

  <g transform="translate(225 66)">
    <circle cx="20" cy="28" r="14" class="metal"/>
    <circle cx="60" cy="28" r="14" class="metal"/>
    <circle cx="40" cy="62" r="14" class="metal"/>
    <circle cx="40" cy="10" r="5" class="electron"/>
    <path d="M40 10 C75 8 92 28 88 62" class="flow"/>
    <text x="42" y="108" text-anchor="middle" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">Nickel</text>
  </g>
</svg>