<svg width="100%" height="100%" viewBox="0 0 450 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Periodic Table Excerpt">
  <rect width="450" height="260" rx="14" fill="#0f172a"/>
  <rect x="10" y="10" width="430" height="240" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  
  <!-- Title -->
  <text x="225" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#e2e8f0">পর্যায় সারণির খণ্ডিত অংশ</text>
  
  <!-- Grid Headers -->
  <g font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">
    <text x="50" y="80" font-family="Noto Sans Bengali, Arial, sans-serif">পর্যায় \ গ্রুপ</text>
    <text x="140" y="80" font-family="Noto Sans Bengali, Arial, sans-serif">গ্রুপ ১৪</text>
    <text x="220" y="80" font-family="Noto Sans Bengali, Arial, sans-serif">গ্রুপ ১৫</text>
    <text x="300" y="80" font-family="Noto Sans Bengali, Arial, sans-serif">গ্রুপ ১৬</text>
    <text x="380" y="80" font-family="Noto Sans Bengali, Arial, sans-serif">গ্রুপ ১৭</text>
  </g>
  
  <!-- Row 1: Period 2 -->
  <g font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">
    <!-- Period Label -->
    <text x="50" y="130" fill="#38bdf8" font-family="Noto Sans Bengali, Arial, sans-serif">পর্যায় ২</text>
    
    <!-- Group 14: C -->
    <rect x="110" y="100" width="60" height="45" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="140" y="128" fill="#e2e8f0" font-size="16" font-family="Noto Sans Bengali, Arial, sans-serif">C</text>
    
    <!-- Group 15: X -->
    <rect x="190" y="100" width="60" height="45" rx="6" fill="#0f172a" stroke="#f472b6" stroke-width="1.5"/>
    <text x="220" y="128" fill="#f472b6" font-size="16" font-family="Noto Sans Bengali, Arial, sans-serif">X</text>
    
    <!-- Group 16: Y -->
    <rect x="270" y="100" width="60" height="45" rx="6" fill="#0f172a" stroke="#facc15" stroke-width="1.5"/>
    <text x="300" y="128" fill="#facc15" font-size="16" font-family="Noto Sans Bengali, Arial, sans-serif">Y</text>
    
    <!-- Group 17: empty -->
    <rect x="350" y="100" width="60" height="45" rx="6" fill="#1e293b" stroke="#334155" stroke-dasharray="3 3"/>
  </g>
  
  <!-- Row 2: Period 3 -->
  <g font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">
    <!-- Period Label -->
    <text x="50" y="195" fill="#38bdf8" font-family="Noto Sans Bengali, Arial, sans-serif">পর্যায় ৩</text>
    
    <!-- Group 14: empty -->
    <rect x="110" y="165" width="60" height="45" rx="6" fill="#1e293b" stroke="#334155" stroke-dasharray="3 3"/>
    
    <!-- Group 15: empty -->
    <rect x="190" y="165" width="60" height="45" rx="6" fill="#1e293b" stroke="#334155" stroke-dasharray="3 3"/>
    
    <!-- Group 16: Z -->
    <rect x="270" y="165" width="60" height="45" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="300" y="193" fill="#a78bfa" font-size="16" font-family="Noto Sans Bengali, Arial, sans-serif">Z</text>
    
    <!-- Group 17: S -->
    <rect x="350" y="165" width="60" height="45" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
    <text x="380" y="193" fill="#34d399" font-size="16" font-family="Noto Sans Bengali, Arial, sans-serif">S</text>
  </g>
</svg>
