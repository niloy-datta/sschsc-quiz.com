<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ssc physics model test 04 q20">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#06b6d4" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="360" height="220" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>
  
  <!-- Principal Axis -->
  <line x1="30" y1="110" x2="330" y2="110" stroke="#64748b" stroke-width="2"/>
  
  <!-- Mirror Back Shadowing / Silvering -->
  <path d="M 268 41 Q 232 110 268 179" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="2 4"/>
  
  <!-- Concave Mirror Curve -->
  <path d="M 265 40 Q 228 110 265 180" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Reference Points Dots -->
  <circle cx="105" cy="110" r="4.5" fill="#f43f5e"/> <!-- C -->
  <circle cx="179" cy="110" r="4.5" fill="#3b82f6"/> <!-- F -->
  <circle cx="246.5" cy="110" r="3.5" fill="#cbd5e1"/> <!-- P -->
  
  <!-- Reference Points Labels -->
  <text x="105" y="132" fill="#f43f5e" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">C</text>
  <text x="179" y="132" fill="#3b82f6" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">F</text>
  <text x="246.5" y="132" fill="#cbd5e1" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">P</text>
  
  <!-- Rays -->
  <!-- Ray 1: Parallel from Object Tip to Mirror, then Reflects through F to Image Tip -->
  <path d="M 105 70 L 253 70" fill="none" stroke="#eab308" stroke-width="2"/>
  <polygon points="175,66 183,70 175,74" fill="#eab308"/> <!-- Ray 1 Direction Arrow -->
  
  <path d="M 253 70 L 105 150" fill="none" stroke="#eab308" stroke-width="2"/>
  <polygon points="146,125 138,132 147,133" fill="#eab308"/> <!-- Ray 1 Reflection Direction Arrow -->
  
  <!-- Ray 2: From Object Tip through F to Mirror, then Reflects Parallel to Image Tip -->
  <path d="M 105 70 L 253 150" fill="none" stroke="#f97316" stroke-width="2"/>
  <polygon points="210,126 218,131 211,134" fill="#f97316"/> <!-- Ray 2 Direction Arrow -->
  
  <path d="M 253 150 L 105 150" fill="none" stroke="#f97316" stroke-width="2"/>
  <polygon points="183,146 175,150 183,154" fill="#f97316"/> <!-- Ray 2 Reflection Direction Arrow -->

  <!-- Object Arrow -->
  <line x1="105" y1="110" x2="105" y2="70" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <polygon points="101,74 105,66 109,74" fill="#10b981"/>
  <text x="90" y="90" fill="#10b981" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="end">বস্তু (O)</text>
  
  <!-- Image Arrow -->
  <line x1="105" y1="110" x2="105" y2="150" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
  <polygon points="101,146 105,154 109,146" fill="#ec4899"/>
  <text x="90" y="136" fill="#ec4899" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="end">প্রতিবিম্ব (I)</text>
  
  <!-- Caption/Title -->
  <text x="180" y="202" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="11" text-anchor="middle">বক্রতার কেন্দ্রে (C) অবস্থিত বস্তুর প্রতিবিম্ব</text>
</svg>
