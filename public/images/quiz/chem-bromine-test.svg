  </defs>
  <rect width="420" height="260" rx="18" fill="#f8fafc"/>
  <rect x="14" y="14" width="392" height="232" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="210.0" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Bromine Test for Unsaturation</text>
  
  <text x="110" y="112" text-anchor="middle" font-size="15" fill="#0f172a" font-family="Noto Sans Bengali, Arial, sans-serif">Alkene / Alkyne</text>
