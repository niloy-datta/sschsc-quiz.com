  <text x="316" y="105" text-anchor="middle" font-size="12" fill="#ea580c" font-family="Noto Sans Bengali, Arial, sans-serif">Red/brown</text>
  <text x="316" y="125" text-anchor="middle" font-size="12" fill="#16a34a" font-family="Noto Sans Bengali, Arial, sans-serif">decolourised</text>
  <text x="210" y="202" text-anchor="middle" font-size="12" fill="#475569" font-family="Noto Sans Bengali, Arial, sans-serif">Unsaturation removes Br₂ colour</text>

