<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bio nephron">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f472b6" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="360" height="240" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>

  <!-- Bowman's capsule / Glomerulus (top-left) -->
  <circle cx="80" cy="65" r="22" fill="none" stroke="#22d3ee" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="80" cy="65" r="10" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
  <text x="80" y="58" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="7" text-anchor="middle" font-weight="bold">A</text>
  <!-- Afferent arteriole -->
  <line x1="55" y1="52" x2="70" y2="58" stroke="#f472b6" stroke-width="2"/>
  <polygon points="68,54 68,62 75,58" fill="#f472b6"/>
  <text x="38" y="48" fill="#fda4af" font-family="system-ui,sans-serif" font-size="7">অভিবাহী</text>
  <!-- Efferent arteriole -->
  <line x1="90" y1="58" x2="105" y2="52" stroke="#fb923c" stroke-width="2"/>
  <polygon points="103,48 103,56 108,52" fill="#fb923c"/>
  <text x="92" y="42" fill="#fdba74" font-family="system-ui,sans-serif" font-size="7">অপবাহী</text>

  <!-- Proximal Convoluted Tubule (PCT) -->
  <path d="M 80 87 Q 90 100 105 95 Q 115 90 120 100 Q 125 110 115 115" fill="none" stroke="#34d399" stroke-width="2.5"/>
  <text x="130" y="86" fill="#86efac" font-family="system-ui,sans-serif" font-size="7">PCT</text>

  <!-- Loop of Henle (descending) -->
  <path d="M 115 115 L 115 155 Q 115 170 125 170" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <text x="96" y="150" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="7">হেনলির লুপ</text>

  <!-- Loop of Henle (ascending) -->
  <path d="M 125 170 Q 135 170 135 155 L 135 120" fill="none" stroke="#a78bfa" stroke-width="2.5"/>

  <!-- Distal Convoluted Tubule (DCT) -->
  <path d="M 135 120 Q 140 108 150 105 Q 160 100 165 105 Q 170 110 160 115" fill="none" stroke="#f472b6" stroke-width="2.5"/>
  <text x="172" y="100" fill="#fda4af" font-family="system-ui,sans-serif" font-size="7">DCT</text>

  <!-- Collecting duct -->
  <path d="M 160 115 L 160 195" fill="none" stroke="#fb923c" stroke-width="3"/>
  <rect x="155" y="195" width="10" height="6" rx="2" fill="#fb923c" opacity="0.6"/>
  <text x="168" y="160" fill="#fdba74" font-family="system-ui,sans-serif" font-size="7">সংগ্রাহক নালিকা</text>

  <!-- Peritubular capillaries (network around tubules) -->
  <path d="M 105 52 Q 130 70 140 90 Q 150 110 140 130 Q 130 150 145 170" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M 145 170 Q 155 155 150 135 Q 145 115 155 95" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Labels -->
  <text x="180" y="222" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">নেফ্রনের গঠন — Structure of Nephron</text>
</svg>