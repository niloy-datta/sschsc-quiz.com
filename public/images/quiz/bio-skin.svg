<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="epidermis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="dermis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="hypodermis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes skin-pulse { 0%,100% { opacity:0.7; } 50% { opacity:1; } }
      @keyframes gland-secrete { 0%,100% { opacity:0.3; r:2; } 50% { opacity:0.8; r:3; } }
      .hair-glow { animation:skin-pulse 3s ease-in-out infinite; }
      .gland-pulse { animation:gland-secrete 3s ease-in-out infinite; }
      .capillary-flow { stroke-dasharray:4 3; }
    </style>
  </defs>

  <rect width="400" height="260" rx="16" fill="url(#bg)" stroke="#1e293b" stroke-width="1.5"/>

  <text x="200" y="22" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" font-weight="bold" filter="url(#glow)">ত্বকের আড়াআড়ি ছেদ — Skin Cross-section</text>

  <!-- Skin layers - Epidermis (top) -->
  <path d="M 20 40 L 380 40 L 380 75 L 20 75 Z" fill="#0f172a" stroke="url(#epidermis)" stroke-width="2.5" filter="url(#glow-strong)"/>
  <rect x="15" y="38" width="50" height="14" rx="4" fill="#7c3aed" opacity="0.3"/>
  <text x="40" y="49" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle" font-weight="bold">এপিডার্মিস</text>

  <!-- Skin layers - Dermis (middle) -->
  <path d="M 20 75 L 380 75 L 380 165 L 20 165 Z" fill="#0f172a" stroke="url(#dermis)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="15" y="73" width="40" height="14" rx="4" fill="#e11d48" opacity="0.3"/>
  <text x="35" y="84" fill="#f472b6" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle" font-weight="bold">ডার্মিস</text>

  <!-- Skin layers - Hypodermis (bottom) -->
  <path d="M 20 165 L 380 165 L 380 230 L 20 230 Z" fill="#0f172a" stroke="url(#hypodermis)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="15" y="163" width="55" height="14" rx="4" fill="#ea580c" opacity="0.3"/>
  <text x="42" y="174" fill="#fb923c" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle" font-weight="bold">হাইপোডার্মিস</text>

  <!-- Hair shaft -->
  <path d="M 100 35 L 95 60 L 98 75" fill="none" stroke="#94a3b8" stroke-width="2" class="hair-glow"/>
  <path d="M 280 35 L 285 55 L 282 75" fill="none" stroke="#94a3b8" stroke-width="2" class="hair-glow" style="animation-delay:0.5s"/>

  <!-- Sweat gland pore -->
  <circle cx="100" cy="35" r="2" fill="#fde68a"/>
  <path d="M 100 70 L 100 110" fill="none" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="2 2"/>

  <!-- Sweat gland (coiled) -->
  <path d="M 90 115 Q 100 110 110 115 Q 115 125 105 130 Q 95 135 90 125 Q 85 115 95 120" fill="none" stroke="#fde68a" stroke-width="1.5"/>
  <text x="70" y="128" fill="#fde68a" font-family="system-ui,sans-serif" font-size="6">ঘর্মগ্রন্থি</text>

  <!-- Sebaceous gland -->
  <ellipse cx="285" cy="72" rx="6" ry="4" fill="none" stroke="#fdba74" stroke-width="1.5"/>
  <path d="M 285 76 L 283 78 L 287 78 Z" fill="#fdba74" opacity="0.5"/>
  <text x="296" y="74" fill="#fdba74" font-family="system-ui,sans-serif" font-size="6">সেবাসিয়াস</text>

  <!-- Hair follicle -->
  <ellipse cx="280" cy="90" rx="5" ry="10" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <path d="M 278 100 L 279 108 L 281 100" fill="none" stroke="#94a3b8" stroke-width="1"/>

  <!-- Blood capillaries -->
  <path d="M 180 80 Q 200 75 220 80 Q 230 85 220 90 Q 200 95 180 90" fill="none" stroke="#f472b6" stroke-width="1.5" class="capillary-flow"/>
  <path d="M 300 80 Q 320 75 340 80 Q 350 85 340 90" fill="none" stroke="#f472b6" stroke-width="1.5" class="capillary-flow"/>
  <text x="340" y="100" fill="#fda4af" font-family="system-ui,sans-serif" font-size="6">কৈশিক নালিকা</text>

  <!-- Nerve ending -->
  <path d="M 180 110 L 185 95" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="185" cy="93" r="2" fill="#a78bfa" class="gland-pulse"/>
  <path d="M 180 110 Q 170 130 165 150" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="150" y="155" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="6">স্নায়ু প্রান্ত</text>

  <!-- Fat cells (adipose) -->
  <circle cx="100" cy="180" r="8" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6"/>
  <circle cx="120" cy="185" r="7" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6"/>
  <circle cx="250" cy="180" r="9" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6"/>
  <circle cx="270" cy="188" r="7" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6"/>
  <circle cx="290" cy="182" r="8" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6"/>
  <text x="180" y="190" fill="#fdba74" font-family="system-ui,sans-serif" font-size="7" text-anchor="middle">চর্বি কোষ (Adipose)</text>

  <!-- Collagen/Elastin fibers -->
  <path d="M 50 85 Q 70 90 80 85" fill="none" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>
  <path d="M 130 90 Q 150 85 160 92" fill="none" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>
  <path d="M 330 85 Q 350 90 360 85" fill="none" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>

  <!-- Bottom info -->
  <rect x="15" y="238" width="370" height="16" rx="4" fill="#131a36" stroke="#1e293b" stroke-width="1"/>
  <text x="200" y="250" fill="#64748b" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">ত্বকের তিন স্তর: এপিডার্মিস, ডার্মিস, হাইপোডার্মিস</text>
</svg>