<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="dna-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="rna-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="base-pair" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow-dna" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-rna" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse-dna { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
      @keyframes float-particle { 0% { transform:translateY(0); opacity:0; } 50% { opacity:0.8; } 100% { transform:translateY(-20px); opacity:0; } }
      .dna-strand { animation:pulse-dna 3s ease-in-out infinite; }
      .particle { animation:float-particle 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" rx="16" fill="url(#bg)" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Decorative background particles -->
  <circle cx="30" cy="40" r="1.5" fill="#22d3ee" opacity="0.3" class="particle"/>
  <circle cx="370" cy="50" r="1" fill="#f472b6" opacity="0.3" class="particle" style="animation-delay:1s"/>
  <circle cx="200" cy="30" r="1.5" fill="#a78bfa" opacity="0.2" class="particle" style="animation-delay:2s"/>
  <circle cx="50" cy="230" r="1" fill="#34d399" opacity="0.3" class="particle" style="animation-delay:1.5s"/>
  <circle cx="350" cy="220" r="1.5" fill="#fde68a" opacity="0.2" class="particle" style="animation-delay:0.5s"/>

  <!-- Section Title: DNA -->
  <rect x="15" y="12" width="170" height="24" rx="12" fill="#22d3ee" opacity="0.15"/>
  <text x="100" y="29" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" font-weight="bold" filter="url(#neon)">DNA (A)</text>

  <!-- DNA Double Helix - Left Side -->
  <g class="dna-strand">
    <!-- Left backbone -->
    <path d="M 55 50 C 80 65, 80 85, 55 100 C 30 115, 30 135, 55 150 C 80 165, 80 185, 55 200" fill="none" stroke="url(#dna-grad)" stroke-width="3.5" filter="url(#glow-dna)" opacity="0.9"/>
    <!-- Right backbone -->
    <path d="M 130 50 C 105 65, 105 85, 130 100 C 155 115, 155 135, 130 150 C 105 165, 105 185, 130 200" fill="none" stroke="url(#dna-grad)" stroke-width="3.5" filter="url(#glow-dna)" opacity="0.9"/>

    <!-- Base pairs (A-T, G-C) with hydrogen bonds -->
    <line x1="56" y1="60" x2="129" y2="60" stroke="#34d399" stroke-width="2.5" stroke-dasharray="4 2"/>
    <circle cx="93" cy="60" r="3" fill="#34d399" opacity="0.6"/>
    <line x1="72" y1="75" x2="113" y2="75" stroke="#f472b6" stroke-width="2.5" stroke-dasharray="4 2"/>
    <circle cx="93" cy="75" r="3" fill="#f472b6" opacity="0.6"/>
    <line x1="55" y1="95" x2="130" y2="95" stroke="#34d399" stroke-width="2.5" stroke-dasharray="4 2"/>
    <circle cx="93" cy="95" r="3" fill="#34d399" opacity="0.6"/>
    <line x1="36" y1="110" x2="149" y2="110" stroke="#f472b6" stroke-width="2.5" stroke-dasharray="4 2"/>
    <circle cx="93" cy="110" r="3" fill="#f472b6" opacity="0.6"/>
    <line x1="55" y1="130" x2="130" y2="130" stroke="#34d399" stroke-width="2.5" stroke-dasharray="4 2"/>
    <circle cx="93" cy="130" r="3" fill="#34d399" opacity="0.6"/>
    <line x1="72" y1="148" x2="113" y2="148" stroke="#f472b6" stroke-width="2.5" stroke-dasharray="4 2"/>
    <circle cx="93" cy="148" r="3" fill="#f472b6" opacity="0.6"/>
    <line x1="56" y1="165" x2="129" y2="165" stroke="#34d399" stroke-width="2.5" stroke-dasharray="4 2"/>
    <circle cx="93" cy="165" r="3" fill="#34d399" opacity="0.6"/>
    <line x1="72" y1="182" x2="113" y2="182" stroke="#f472b6" stroke-width="2.5" stroke-dasharray="4 2"/>
    <circle cx="93" cy="182" r="3" fill="#f472b6" opacity="0.6"/>
    <line x1="56" y1="198" x2="129" y2="198" stroke="#34d399" stroke-width="2.5" stroke-dasharray="4 2"/>
    <circle cx="93" cy="198" r="3" fill="#34d399" opacity="0.6"/>
  </g>

  <!-- Legend for DNA bases -->
  <rect x="15" y="218" width="8" height="8" rx="2" fill="#34d399" opacity="0.7"/>
  <text x="26" y="226" fill="#86efac" font-family="system-ui,sans-serif" font-size="8">A—T</text>
  <rect x="65" y="218" width="8" height="8" rx="2" fill="#f472b6" opacity="0.7"/>
  <text x="76" y="226" fill="#fda4af" font-family="system-ui,sans-serif" font-size="8">G—C</text>

  <!-- Divider -->
  <line x1="175" y1="20" x2="175" y2="240" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Section Title: RNA -->
  <rect x="190" y="12" width="170" height="24" rx="12" fill="#f472b6" opacity="0.15"/>
  <text x="275" y="29" fill="#f472b6" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle" font-weight="bold" filter="url(#neon)">RNA (B)</text>

  <!-- RNA Single Strand - Right Side -->
  <g>
    <!-- Backbone -->
    <path d="M 230 50 C 255 70, 270 80, 260 100 C 250 120, 280 130, 265 150 C 250 170, 275 180, 260 200" fill="none" stroke="url(#rna-grad)" stroke-width="3.5" filter="url(#glow-rna)"/>

    <!-- Nucleotide bases (single strand) -->
    <g fill="#34d399" opacity="0.8">
      <rect x="260" y="52" width="14" height="10" rx="3"/>
      <text x="267" y="60" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">A</text>
    </g>
    <g fill="#f472b6" opacity="0.8">
      <rect x="270" y="72" width="14" height="10" rx="3"/>
      <text x="277" y="80" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">U</text>
    </g>
    <g fill="#34d399" opacity="0.8">
      <rect x="258" y="96" width="14" height="10" rx="3"/>
      <text x="265" y="104" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">G</text>
    </g>
    <g fill="#f472b6" opacity="0.8">
      <rect x="245" y="118" width="14" height="10" rx="3"/>
      <text x="252" y="126" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">C</text>
    </g>
    <g fill="#34d399" opacity="0.8">
      <rect x="262" y="142" width="14" height="10" rx="3"/>
      <text x="269" y="150" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">A</text>
    </g>
    <g fill="#f472b6" opacity="0.8">
      <rect x="275" y="162" width="14" height="10" rx="3"/>
      <text x="282" y="170" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">U</text>
    </g>
    <g fill="#34d399" opacity="0.8">
      <rect x="260" y="186" width="14" height="10" rx="3"/>
      <text x="267" y="194" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">G</text>
    </g>
  </g>

  <!-- RNA Legend -->
  <rect x="190" y="218" width="8" height="8" rx="2" fill="#34d399" opacity="0.7"/>
  <text x="201" y="226" fill="#86efac" font-family="system-ui,sans-serif" font-size="8">A, G</text>
  <rect x="245" y="218" width="8" height="8" rx="2" fill="#f472b6" opacity="0.7"/>
  <text x="256" y="226" fill="#fda4af" font-family="system-ui,sans-serif" font-size="8">U, C</text>

  <!-- Key info badges -->
  <rect x="15" y="238" width="370" height="16" rx="4" fill="#1e293b" opacity="0.6"/>
  <text x="200" y="250" fill="#64748b" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">ডাবল হেলিক্স (ডাবল স্ট্র্যান্ড) vs সিঙ্গেল স্ট্র্যান্ড</text>
</svg>