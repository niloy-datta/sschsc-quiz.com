<svg width="100%" height="100%" viewBox="0 0 420 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mitochondria and Chloroplast">
  <defs>
    <linearGradient id="bgGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef2ff" />
      <stop offset="100%" stop-color="#e0f7ff" />
    </linearGradient>
    <linearGradient id="mitoGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="chloroGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#bbf7d0" />
      <stop offset="100%" stop-color="#4ade80" />
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#7dd3fc" flood-opacity="0.18" />
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#34d399" flood-opacity="0.12" />
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="420" height="260" rx="24" fill="url(#bgGradient)" />
  <rect x="12" y="12" width="396" height="236" rx="20" fill="#ffffff" fill-opacity="0.9" stroke="#94a3b8" stroke-opacity="0.32" stroke-width="1.5" />

  <g filter="url(#innerGlow)">
    <circle cx="125" cy="108" r="65" fill="#eff6ff" opacity="0.92" />
    <circle cx="295" cy="108" r="65" fill="#ecfdf5" opacity="0.92" />
  </g>

  <path d="M78 118 C76 88, 96 66, 122 70 C140 74, 158 88, 162 112 C166 140, 150 168, 128 160 C112 154, 104 142, 96 132 C84 126, 80 123, 78 118 Z" fill="url(#mitoGradient)" stroke="#0284c7" stroke-width="3" filter="url(#softGlow)" />
  <path d="M96 108 C104 98, 114 100, 122 108 C130 116, 136 128, 140 138 C142 146, 140 153, 136 158 C132 162, 124 164, 118 160 C112 156, 106 148, 102 138 C98 128, 96 118, 96 108 Z" fill="#ffffff" opacity="0.5" />
  <g stroke="#fb923c" stroke-width="4" stroke-linecap="round">
    <path d="M104 108 C110 98, 116 110, 124 100" />
    <path d="M112 124 C118 116, 126 130, 134 122" />
    <path d="M120 138 C126 130, 134 144, 142 136" />
  </g>
  <circle cx="125" cy="126" r="28" fill="#ffffff" fill-opacity="0.1" />
  <circle cx="125" cy="126" r="18" fill="#ffffff" fill-opacity="0.14" />

  <path d="M248 104 C244 76, 266 60, 292 68 C308 74, 324 86, 332 106 C338 128, 332 146, 312 152 C298 156, 286 148, 272 138 C260 130, 256 118, 248 104 Z" fill="url(#chloroGradient)" stroke="#16a34a" stroke-width="3" filter="url(#softGlow)" />
  <path d="M262 96 C266 88, 276 88, 284 96 C292 104, 298 112, 302 122 C304 130, 302 138, 298 144 C294 150, 288 152, 282 150 C276 148, 270 142, 266 134 C262 125, 262 110, 262 96 Z" fill="#ffffff" opacity="0.42" />
  <g stroke="#15803d" stroke-width="4" stroke-linecap="round">
    <line x1="268" y1="94" x2="316" y2="94" />
    <line x1="270" y1="106" x2="318" y2="106" />
    <line x1="272" y1="118" x2="320" y2="118" />
    <line x1="274" y1="130" x2="322" y2="130" />
  </g>
  <circle cx="295" cy="126" r="30" fill="#ffffff" fill-opacity="0.1" />

  <text x="210" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#0f172a">Mitochondria & Chloroplast</text>
  <text x="210" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Energy organelles: ATP production and photosynthesis</text>

  <rect x="86" y="182" width="78" height="40" rx="18" fill="#ffffff" fill-opacity="0.93" stroke="#0f172a" stroke-opacity="0.08" stroke-width="1" />
  <text x="125" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Mitochondria</text>
  <text x="125" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fb923c">Cristae + ATP</text>

  <rect x="256" y="182" width="78" height="40" rx="18" fill="#ffffff" fill-opacity="0.93" stroke="#0f172a" stroke-opacity="0.08" stroke-width="1" />
  <text x="295" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Chloroplast</text>
  <text x="295" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#15803d">Grana / Thylakoid</text>
</svg>
