<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="100%" height="100%" role="img" aria-label="physics ssc science physics board questions year wise 2023 sylhet ts 11">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Card -->
  <rect width="360" height="220" rx="18" fill="url(#bgGradient)"/>
  <rect x="8" y="8" width="344" height="204" rx="14" fill="none" stroke="#1e293b" stroke-width="1.5"/>
  
  <!-- Title -->
  <text x="180" y="32" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="0.5">তড়িৎ বর্তনী (Circuit Diagram)</text>
  
  <!-- Wires Group -->
  <g stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <!-- Main loop path -->
    <!-- Top left wire to R1 -->
    <line x1="70" y1="80" x2="100" y2="80"/>
    <!-- Wire from R1 to split point -->
    <line x1="140" y1="80" x2="185" y2="80"/>
    
    <!-- Split vertical wire -->
    <line x1="185" y1="45" x2="185" y2="115"/>
    
    <!-- Top parallel branch wires -->
    <line x1="185" y1="45" x2="210" y2="45"/>
    <line x1="250" y1="45" x2="275" y2="45"/>
    
    <!-- Bottom parallel branch wires -->
    <line x1="185" y1="115" x2="210" y2="115"/>
    <line x1="250" y1="115" x2="275" y2="115"/>
    
    <!-- Merge vertical wire -->
    <line x1="275" y1="45" x2="275" y2="115"/>
    
    <!-- Wire from merge point to right corner -->
    <line x1="275" y1="80" x2="305" y2="80"/>
    <!-- Right vertical wire -->
    <line x1="305" y1="80" x2="305" y2="165"/>
    <!-- Bottom wire -->
    <line x1="305" y1="165" x2="70" y2="165"/>
    
    <!-- Left vertical wires to battery -->
    <line x1="70" y1="80" x2="70" y2="110"/>
    <line x1="70" y1="128" x2="70" y2="165"/>
    
    <!-- Resistor R1 Zigzag -->
    <path d="M100 80 l3 -10 l5 20 l5 -20 l5 20 l5 -20 l5 20 l5 -20 l4 20 l3 -10" />
    
    <!-- Resistor R2 Zigzag -->
    <path d="M210 45 l3 -10 l5 20 l5 -20 l5 20 l5 -20 l5 20 l5 -20 l4 20 l3 -10" />
    
    <!-- Resistor R3 Zigzag -->
    <path d="M210 115 l3 -10 l5 20 l5 -20 l5 20 l5 -20 l5 20 l5 -20 l4 20 l3 -10" />
  </g>
  
  <!-- Battery Cell Plates (Amber glowing) -->
  <g stroke="#fbbf24" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <!-- Plate 1 (Long, Positive) -->
    <line x1="55" y1="110" x2="85" y2="110"/>
    <!-- Plate 2 (Short, Negative) -->
    <line x1="62" y1="116" x2="78" y2="116"/>
    <!-- Plate 3 (Long, Positive) -->
    <line x1="55" y1="122" x2="85" y2="122"/>
    <!-- Plate 4 (Short, Negative) -->
    <line x1="62" y1="128" x2="78" y2="128"/>
  </g>
  
  <!-- Junction Dots -->
  <circle cx="185" cy="80" r="3.5" fill="#38bdf8"/>
  <circle cx="275" cy="80" r="3.5" fill="#38bdf8"/>
  
  <!-- Labels -->
  <g font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700">
    <!-- Battery E -->
    <text x="36" y="123" fill="#fbbf24" text-anchor="end" font-family="Noto Sans Bengali, Arial, sans-serif">E</text>
    
    <!-- Resistor R1 -->
    <text x="120" y="58" fill="#e2e8f0" text-anchor="middle" font-family="Noto Sans Bengali, Arial, sans-serif">R₁</text>
    
    <!-- Resistor R2 -->
    <text x="230" y="24" fill="#e2e8f0" text-anchor="middle" font-family="Noto Sans Bengali, Arial, sans-serif">R₂</text>
    
    <!-- Resistor R3 -->
    <text x="230" y="146" fill="#e2e8f0" text-anchor="middle" font-family="Noto Sans Bengali, Arial, sans-serif">R₃</text>
  </g>
</svg>
