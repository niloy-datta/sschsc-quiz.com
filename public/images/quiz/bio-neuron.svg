<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bio neuron">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#34d399" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="360" height="220" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>

  <!-- Dendrites (branching structures on left) -->
  <path d="M 80 105 Q 60 70 40 55" fill="none" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
  <path d="M 80 105 Q 50 85 30 90" fill="none" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
  <path d="M 80 105 Q 55 110 35 125" fill="none" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
  <path d="M 80 105 Q 60 130 40 150" fill="none" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
  <path d="M 80 105 Q 70 80 65 60" fill="none" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Smaller dendrite branches -->
  <path d="M 40 55 Q 35 40 25 35" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
  <path d="M 40 55 Q 30 50 20 48" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
  <path d="M 35 125 Q 20 128 15 135" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
  <path d="M 40 150 Q 30 160 25 165" fill="none" stroke="#67e8f9" stroke-width="1.5"/>

  <text x="18" y="46" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="7">ডেনড্রাইট</text>

  <!-- Cell body (soma) -->
  <circle cx="100" cy="105" r="20" fill="#1e293b" stroke="#f472b6" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Nucleus inside cell body -->
  <circle cx="100" cy="105" r="10" fill="#1e293b" stroke="#fde68a" stroke-width="2"/>
  <circle cx="100" cy="105" r="4" fill="#fde68a" opacity="0.5"/>
  <text x="106" y="130" fill="#fda4af" font-family="system-ui,sans-serif" font-size="7">কোষদেহ</text>

  <!-- Axon hillock -->
  <path d="M 118 100 L 128 98 L 128 112 L 118 110" fill="none" stroke="#22d3ee" stroke-width="1.5"/>

  <!-- Axon (long fiber) -->
  <line x1="128" y1="105" x2="280" y2="105" stroke="#22d3ee" stroke-width="3" filter="url(#glow)"/>

  <!-- Myelin sheath sections (interrupted by Nodes of Ranvier) -->
  <rect x="145" y="97" width="25" height="16" rx="4" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <rect x="180" y="97" width="25" height="16" rx="4" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <rect x="215" y="97" width="25" height="16" rx="4" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <rect x="250" y="97" width="20" height="16" rx="4" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>

  <!-- Nodes of Ranvier (gaps) -->
  <circle cx="142" cy="105" r="2" fill="#fde68a"/>
  <circle cx="177" cy="105" r="2" fill="#fde68a"/>
  <circle cx="212" cy="105" r="2" fill="#fde68a"/>
  <circle cx="247" cy="105" r="2" fill="#fde68a"/>

  <text x="188" y="88" fill="#86efac" font-family="system-ui,sans-serif" font-size="7">মায়েলিন শিথ</text>

  <!-- Axon terminal branches -->
  <path d="M 280 105 Q 295 85 310 75" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <path d="M 280 105 Q 300 105 315 105" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <path d="M 280 105 Q 295 125 310 135" fill="none" stroke="#22d3ee" stroke-width="2"/>

  <!-- Terminal boutons -->
  <circle cx="310" cy="75" r="6" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
  <circle cx="315" cy="105" r="6" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
  <circle cx="310" cy="135" r="6" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>

  <text x="300" y="62" fill="#fda4af" font-family="system-ui,sans-serif" font-size="7">অ্যাক্সন</text>
  <text x="300" y="70" fill="#fda4af" font-family="system-ui,sans-serif" font-size="7">প্রান্ত</text>

  <!-- Synaptic cleft -->
  <path d="M 316 75 L 330 75" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M 321 105 L 330 105" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M 316 135 L 330 135" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Synaptic vesicles -->
  <circle cx="320" cy="78" r="1.5" fill="#fde68a" opacity="0.7"/>
  <circle cx="322" cy="74" r="1.5" fill="#fde68a" opacity="0.7"/>
  <circle cx="323" cy="106" r="1.5" fill="#fde68a" opacity="0.7"/>
  <circle cx="320" cy="138" r="1.5" fill="#fde68a" opacity="0.7"/>

  <text x="180" y="202" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">স্নায়ুকোষ (নিউরন) — Structure of a Neuron</text>
</svg>