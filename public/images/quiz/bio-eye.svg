<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bio eye">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f472b6" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="360" height="220" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>

  <!-- Eye globe -->
  <ellipse cx="185" cy="110" rx="120" ry="75" fill="none" stroke="#475569" stroke-width="2"/>

  <!-- Sclera (outer layer) -->
  <ellipse cx="185" cy="110" rx="115" ry="70" fill="none" stroke="#64748b" stroke-width="1.5"/>

  <!-- Cornea (front bulge) -->
  <path d="M 75 75 Q 55 110 75 145" fill="none" stroke="#22d3ee" stroke-width="2.5" filter="url(#glow)"/>
  <text x="42" y="112" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="8">কর্নিয়া</text>

  <!-- Anterior chamber -->
  <path d="M 80 82 Q 70 110 80 138" fill="#1e293b" stroke="none"/>

  <!-- Iris -->
  <ellipse cx="110" cy="110" rx="25" ry="35" fill="#1e293b" stroke="#f472b6" stroke-width="2.5" filter="url(#glow-pink)"/>
  <text x="88" y="96" fill="#fda4af" font-family="system-ui,sans-serif" font-size="7">আইরিস</text>

  <!-- Pupil -->
  <ellipse cx="110" cy="110" rx="12" ry="18" fill="#07111f"/>

  <!-- Lens -->
  <ellipse cx="130" cy="110" rx="16" ry="30" fill="none" stroke="#fde68a" stroke-width="2"/>
  <line x1="130" y1="80" x2="130" y2="140" stroke="#fde68a" stroke-width="1" opacity="0.5"/>
  <text x="136" y="78" fill="#fde68a" font-family="system-ui,sans-serif" font-size="7">লেন্স</text>

  <!-- Vitreous humor -->
  <path d="M 146 88 Q 160 50 200 45 Q 260 42 290 65 Q 305 110 290 155 Q 260 178 200 175 Q 160 172 146 132" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Retina -->
  <path d="M 200 45 Q 260 42 290 65 Q 305 110 290 155 Q 260 178 200 175" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="296" y="88" fill="#86efac" font-family="system-ui,sans-serif" font-size="8">রেটিনা</text>

  <!-- Fovea / Yellow spot -->
  <circle cx="245" cy="110" r="8" fill="none" stroke="#fde68a" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="252" y="116" fill="#fde68a" font-family="system-ui,sans-serif" font-size="6">ফোভিয়া</text>

  <!-- Optic nerve -->
  <path d="M 295 95 L 320 85 L 335 80" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <path d="M 295 125 L 320 135 L 335 140" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <line x1="335" y1="80" x2="340" y2="140" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
  <text x="330" y="68" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="8">অপটিক</text>
  <text x="330" y="77" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="8">নার্ভ</text>

  <!-- Blind spot -->
  <circle cx="295" cy="110" r="4" fill="#f472b6" opacity="0.7"/>

  <text x="180" y="204" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">চোখের লম্বচ্ছেদ — Cross-section of Human Eye</text>
</svg>