<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <style>
      .bg{fill:#020617}
      .eye{fill:#0f172a;stroke:#e5e7eb;stroke-width:3}
      .lens{fill:#38bdf8;fill-opacity:.25;stroke:#38bdf8;stroke-width:3}
      .retina{fill:none;stroke:#f59e0b;stroke-width:5;stroke-linecap:round}
      .ray{stroke:#38bdf8;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .label{font-family:Arial,sans-serif;font-size:17px;font-weight:800;fill:#e5e7eb}
    </style>
  </defs>
  <rect width="360" height="220" rx="18" class="bg"/>
  <path d="M45 110 C95 45 235 45 315 110 C235 175 95 175 45 110Z" class="eye"/>
  <ellipse cx="132" cy="110" rx="20" ry="48" class="lens"/>
  <circle cx="95" cy="110" r="20" fill="#020617" stroke="#38bdf8" stroke-width="3"/>
  <path d="M268 65 C242 95 242 125 268 155" class="retina"/>
  <path d="M35 78 L132 110 L262 92" class="ray"/>
  <path d="M35 142 L132 110 L262 128" class="ray"/>
  <text x="95" y="88" text-anchor="middle" class="label">A</text>
  <text x="132" y="170" text-anchor="middle" class="label">B</text>
  <text x="270" y="55" text-anchor="middle" class="label">C</text>
</svg>
