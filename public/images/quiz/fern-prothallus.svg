<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="fern prothallus">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="360" height="220" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>

  <text x="180" y="20" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" font-weight="bold">ফার্ন প্রোথ্যালাস — Fern Prothallus</text>

  <!-- Heart-shaped prothallus body -->
  <path d="M 180 35 Q 260 40 270 100 Q 280 165 180 190 Q 80 165 90 100 Q 100 40 180 35 Z" fill="#0f172a" stroke="#22d3ee" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Notch (apical) -->
  <path d="M 180 35 Q 170 50 180 65 Q 190 50 180 35" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>

  <!-- Rhizoids (on underside, bottom) -->
  <path d="M 150 170 Q 140 185 135 192" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <path d="M 165 175 Q 160 190 155 195" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <path d="M 180 185 Q 180 195 178 200" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <path d="M 195 175 Q 200 190 205 195" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <path d="M 210 170 Q 220 185 225 192" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <text x="140" y="200" fill="#fda4af" font-family="system-ui,sans-serif" font-size="7">রাইজয়েড</text>

  <!-- Antheridia (male reproductive structures, near apex) -->
  <circle cx="155" cy="70" r="6" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <circle cx="170" cy="60" r="6" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <circle cx="190" cy="60" r="6" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <circle cx="205" cy="70" r="6" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <text x="215" y="65" fill="#86efac" font-family="system-ui,sans-serif" font-size="7">অ্যানথেরিডিয়া</text>

  <!-- Archegonia (female reproductive structures, near notch) -->
  <ellipse cx="160" cy="100" rx="4" ry="8" fill="none" stroke="#fde68a" stroke-width="2"/>
  <ellipse cx="180" cy="95" rx="4" ry="8" fill="none" stroke="#fde68a" stroke-width="2"/>
  <ellipse cx="200" cy="100" rx="4" ry="8" fill="none" stroke="#fde68a" stroke-width="2"/>
  <text x="160" y="118" fill="#fde68a" font-family="system-ui,sans-serif" font-size="7">আর্কিগোনিয়া</text>

  <!-- Thallus cells (polygonal network) -->
  <path d="M 120 130 L 140 120 L 160 130 L 150 145 L 130 145 Z" fill="none" stroke="#475569" stroke-width="0.8" opacity="0.5"/>
  <path d="M 160 130 L 180 120 L 200 130 L 190 145 L 170 145 Z" fill="none" stroke="#475569" stroke-width="0.8" opacity="0.5"/>
  <path d="M 200 130 L 220 120 L 240 130 L 230 145 L 210 145 Z" fill="none" stroke="#475569" stroke-width="0.8" opacity="0.5"/>

  <text x="180" y="213" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">ফার্নের প্রোথ্যালাস (গ্যামিটোফাইট)</text>
</svg>