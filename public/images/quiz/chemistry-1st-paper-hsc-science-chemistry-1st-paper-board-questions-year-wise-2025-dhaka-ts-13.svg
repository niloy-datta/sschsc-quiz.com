<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <style>
      .wave1{fill:none;stroke:#ef4444;stroke-width:4;stroke-linecap:round}
      .wave2{fill:none;stroke:#38bdf8;stroke-width:3;stroke-linecap:round}
      .base{stroke:#64748b;stroke-width:1.5;stroke-dasharray:6 5}
      .label{font-family:Arial,sans-serif;font-size:12px;font-weight:800;fill:#fff}
    </style>
  </defs>

  <rect width="360" height="220" rx="18" fill="url(#bg)"/>

  <line x1="35" y1="85" x2="325" y2="85" class="base"/>
  <line x1="35" y1="150" x2="325" y2="150" class="base"/>

  <path d="M35 85 C80 35 130 35 175 85 S270 135 325 85" class="wave1"/>
  <path d="M35 150 C55 120 75 120 95 150 S135 180 155 150 S195 120 215 150 S255 180 275 150 S315 120 325 150" class="wave2"/>

  <text x="180" y="65" text-anchor="middle" class="label">Long wavelength</text>
  <text x="180" y="197" text-anchor="middle" class="label">Short wavelength</text>
</svg>