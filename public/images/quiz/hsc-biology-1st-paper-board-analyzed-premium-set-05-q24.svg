<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22c55e" flood-opacity=".6"/>
    </filter>

    <style>
      .bacteria{fill:#052e16;stroke:#86efac;stroke-width:3;filter:url(#glow)}
      .mainDNA{fill:none;stroke:#38bdf8;stroke-width:4;stroke-linecap:round}
      .plasmid{fill:none;stroke:#facc15;stroke-width:7;stroke-linecap:round;filter:url(#glow)}
      .small{fill:#fef3c7}
      .label{font-family:Arial,sans-serif;font-size:18px;font-weight:900;fill:#e5e7eb}
    </style>
  </defs>

  <rect width="360" height="220" rx="18" fill="url(#bg)"/>

  <rect x="68" y="48" width="224" height="124" rx="62" class="bacteria"/>

  <path d="M100 112 C130 78 160 146 190 112 S250 78 270 112" class="mainDNA"/>
  <ellipse cx="145" cy="132" rx="27" ry="19" class="plasmid"/>

  <circle cx="92" cy="82" r="3" class="small"/>
  <circle cx="255" cy="142" r="3" class="small"/>
  <circle cx="230" cy="76" r="3" class="small"/>

  <text x="145" y="132" text-anchor="middle" class="label">P</text>
</svg>
