<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <radialGradient id="head" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>

    <linearGradient id="stalk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000000" flood-opacity=".45"/>
    </filter>

    <style>
      .stalk{fill:none;stroke:url(#stalk);stroke-width:8;stroke-linecap:round;filter:url(#shadow)}
      .head{fill:url(#head);stroke:#fef3c7;stroke-width:2.5;filter:url(#shadow)}
      .ring{fill:none;stroke:#fef3c7;stroke-width:1.6;opacity:.8}
      .spore{fill:#fff7ed;opacity:.9}
      .label{font-family:Arial,sans-serif;font-size:20px;font-weight:900;fill:#e5e7eb}
    </style>
  </defs>

  <rect width="360" height="220" rx="18" fill="url(#bg)"/>

  <path d="M178 188 C175 153 170 123 185 94 C193 78 202 66 206 50" class="stalk"/>

  <ellipse cx="210" cy="55" rx="48" ry="40" class="head"/>
  <ellipse cx="210" cy="55" rx="31" ry="24" class="ring"/>

  <circle cx="194" cy="46" r="4" class="spore"/>
  <circle cx="213" cy="38" r="4" class="spore"/>
  <circle cx="228" cy="53" r="4" class="spore"/>
  <circle cx="205" cy="65" r="4" class="spore"/>
  <circle cx="224" cy="72" r="3.5" class="spore"/>

  <text x="266" y="54" text-anchor="middle" class="label">P</text>
  <line x1="252" y1="58" x2="232" y2="58" stroke="#fef3c7" stroke-width="2.3"/>
</svg>
