<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="360" height="220" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>
  
    <!-- Source -->
    <circle cx="50" cy="110" r="4" fill="#fde68a" filter="url(#glow)"/>
    <text x="50" y="95" fill="#fde68a" font-size="10" font-family="Segoe UI" text-anchor="middle">উৎস (S)</text>
    
    <!-- Spherical wavefronts -->
    <path d="M90,70 A60,60 0 0,1 90,150" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4 3"/>
    <path d="M130,50 A100,100 0 0,1 130,170" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <path d="M170,30 A140,140 0 0,1 170,190" fill="none" stroke="#22d3ee" stroke-width="2.5" filter="url(#glow)"/>
    
    <!-- Light rays -->
    <line x1="54" y1="110" x2="250" y2="50" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="5 3"/>
    <line x1="54" y1="110" x2="250" y2="170" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="5 3"/>
    
    <!-- Text -->
    <text x="260" y="55" fill="#94a3b8" font-size="10" font-family="Segoe UI">আলোকরশ্মি (Rays)</text>
    <text x="180" y="150" fill="#e2e8f0" font-size="10" font-family="Segoe UI">গোলকীয় তরঙ্গমুখ (Wavefront)</text>
  
  <text x="180" y="208" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="11" text-anchor="middle">অপবর্তন — তরঙ্গমুখ ও রশ্মি চিত্র</text>
</svg>
