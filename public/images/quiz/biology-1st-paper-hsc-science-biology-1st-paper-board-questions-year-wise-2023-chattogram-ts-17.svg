  <path d="M180 54 C170 91 170 132 180 176" class="vein"/>
  <path d="M180 78 C150 92 130 112 116 145" class="vein"/>
  <path d="M180 78 C210 92 230 112 244 145" class="vein"/>

  <path d="M146 177 C133 194 123 202 110 211" class="root"/>
  <path d="M167 184 C160 200 152 208 143 215" class="root"/>
  <path d="M194 184 C202 200 210 208 220 215" class="root"/>
