<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="72%">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <radialGradient id="body" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="45%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity=".45"/>
