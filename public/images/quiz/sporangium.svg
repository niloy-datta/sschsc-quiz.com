<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="sporangium">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="360" height="220" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>

  <text x="180" y="20" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" font-weight="bold">স্পোরাঞ্জিয়াম (ফার্ন)</text>

  <!-- Stalk (seta) -->
  <rect x="175" y="85" width="10" height="70" rx="3" fill="none" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
  <text x="195" y="120" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="7">বৃন্ত</text>

  <!-- Sporangium capsule -->
  <ellipse cx="180" cy="70" rx="25" ry="30" fill="#0f172a" stroke="#f472b6" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="180" cy="70" rx="25" ry="30" fill="none" stroke="#f472b6" stroke-width="2.5"/>

  <!-- Annulus (thickened cell band) -->
  <path d="M 160 50 Q 155 70 160 90" fill="none" stroke="#34d399" stroke-width="3"/>
  <path d="M 200 50 Q 205 70 200 90" fill="none" stroke="#34d399" stroke-width="3"/>
  <text x="132" y="70" fill="#86efac" font-family="system-ui,sans-serif" font-size="7">অ্যানুলাস</text>

  <!-- Spores inside capsule -->
  <circle cx="172" cy="62" r="3" fill="#fde68a" opacity="0.7"/>
  <circle cx="185" cy="58" r="3" fill="#fde68a" opacity="0.7"/>
  <circle cx="178" cy="72" r="3" fill="#fde68a" opacity="0.7"/>
  <circle cx="190" cy="70" r="3" fill="#fde68a" opacity="0.7"/>
  <circle cx="175" cy="80" r="3" fill="#fde68a" opacity="0.7"/>
  <circle cx="188" cy="82" r="3" fill="#fde68a" opacity="0.7"/>
  <text x="155" y="100" fill="#fde68a" font-family="system-ui,sans-serif" font-size="7">স্পোর</text>

  <!-- Stomium (dehiscence point) -->
  <path d="M 180 94 L 180 98" stroke="#fb923c" stroke-width="2"/>
  <text x="190" y="100" fill="#fdba74" font-family="system-ui,sans-serif" font-size="6">স্টোমিয়াম</text>

  <!-- Rhizoids (bottom) -->
  <path d="M 170 155 Q 160 175 155 185" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <path d="M 180 155 L 180 185" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <path d="M 190 155 Q 200 175 205 185" fill="none" stroke="#22d3ee" stroke-width="1.5"/>

  <text x="160" y="195" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="7">রাইজয়েড</text>

  <text x="180" y="213" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">ফার্নের স্পোরাঞ্জিয়াম ও স্পোর উৎপাদন</text>
</svg>