<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bio alveoli">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="360" height="220" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>

  <text x="180" y="22" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" font-weight="bold">ফুসফুসের অ্যালভিওলাই — Lung Alveoli</text>

  <!-- Bronchiole (large airway) -->
  <path d="M 50 65 Q 70 55 90 55 Q 110 55 130 65" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 50 65 Q 70 75 90 75 Q 110 75 130 65" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <text x="60" y="56" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="7">শ্বাসনালিকা</text>

  <!-- Alveolar duct -->
  <path d="M 130 65 L 170 65 L 210 55" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <path d="M 130 65 L 170 65 L 210 75" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <path d="M 130 65 L 170 75 L 220 85" fill="none" stroke="#22d3ee" stroke-width="2"/>

  <!-- Alveoli sacs (grape-like clusters) -->
  <!-- Cluster 1 -->
  <ellipse cx="230" cy="50" rx="22" ry="16" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="260" cy="42" rx="18" ry="14" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="280" cy="55" rx="20" ry="15" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="300" cy="40" rx="16" ry="12" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="315" cy="55" rx="14" ry="11" fill="#0f172a" stroke="#34d399" stroke-width="2"/>

  <!-- Cluster 2 -->
  <ellipse cx="240" cy="82" rx="18" ry="14" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="265" cy="78" rx="15" ry="12" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="290" cy="78" rx="16" ry="13" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="310" cy="75" rx="14" ry="12" fill="#0f172a" stroke="#34d399" stroke-width="2"/>

  <!-- Cluster 3 -->
  <ellipse cx="255" cy="100" rx="16" ry="13" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="280" cy="98" rx="18" ry="14" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="305" cy="95" rx="15" ry="12" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <ellipse cx="325" cy="90" rx="12" ry="10" fill="#0f172a" stroke="#34d399" stroke-width="2"/>

  <text x="265" y="122" fill="#86efac" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">অ্যালভিওলাই</text>

  <!-- Capillaries surrounding alveoli (red network) -->
  <path d="M 220 45 Q 235 35 250 38 Q 270 28 285 38 Q 300 30 315 38" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <path d="M 315 38 Q 325 45 318 55 Q 330 65 320 72" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <path d="M 320 72 Q 310 80 295 78 Q 285 88 270 82" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <path d="M 270 82 Q 260 90 250 85 Q 240 92 235 82" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <path d="M 235 82 Q 230 72 240 65 Q 228 58 220 55" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <text x="330" y="65" fill="#fda4af" font-family="system-ui,sans-serif" font-size="6">কৈশিক</text>

  <!-- Oxygen label -->
  <text x="195" y="148" fill="#86efac" font-family="system-ui,sans-serif" font-size="9">O₂ → রক্তে</text>
  <text x="195" y="160" fill="#fda4af" font-family="system-ui,sans-serif" font-size="9">CO₂ ← রক্ত থেকে</text>

  <!-- Arrows for gas exchange -->
  <path d="M 220 148 L 245 140" stroke="#86efac" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 245 160 L 220 155" stroke="#fda4af" stroke-width="1.5" marker-end="url(#arrow-pink)"/>

  <text x="180" y="200" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">গ্যাস বিনিময় — Gas Exchange in Alveoli</text>
</svg>