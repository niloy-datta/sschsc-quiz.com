<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220">
  <defs>
    <style>
      .bg{fill:#020617}
      .wall{fill:#14532d;stroke:#86efac;stroke-width:5}
      .membrane{fill:#0f172a;stroke:#38bdf8;stroke-width:3}
      .nucleus{fill:#facc15;stroke:#fef3c7;stroke-width:2}
      .label{font-family:Arial,sans-serif;font-size:18px;font-weight:900;fill:#e5e7eb}
      .small{font-family:"Noto Sans Bengali",Arial,sans-serif;font-size:12px;font-weight:700;fill:#cbd5e1}
    </style>
  </defs>

  <rect width="360" height="220" rx="18" class="bg"/>

  <rect x="70" y="45" width="220" height="130" rx="18" class="wall"/>
  <rect x="95" y="70" width="170" height="80" rx="14" class="membrane"/>
  <circle cx="180" cy="110" r="22" class="nucleus"/>

  <text x="292" y="105" text-anchor="middle" class="label">B</text>
  <line x1="278" y1="102" x2="252" y2="82" stroke="#facc15" stroke-width="2.5"/>

  <text x="180" y="205" text-anchor="middle" class="small">উদ্ভিদ কোষপ্রাচীর</text>
</svg>
