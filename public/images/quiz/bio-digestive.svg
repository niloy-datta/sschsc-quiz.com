<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bio digestive">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#fb923c" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="360" height="240" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>

  <!-- Mouth / Oral cavity -->
  <ellipse cx="180" cy="28" rx="30" ry="12" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <text x="180" y="18" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="7" text-anchor="middle">মুখ (Mouth)</text>

  <!-- Pharynx -->
  <path d="M 170 38 L 170 55 Q 170 60 165 62" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <path d="M 190 38 L 190 55 Q 190 60 195 62" fill="none" stroke="#22d3ee" stroke-width="2"/>

  <!-- Esophagus -->
  <rect x="168" y="55" width="24" height="45" rx="6" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="200" y="78" fill="#86efac" font-family="system-ui,sans-serif" font-size="7">খাদ্যনালী</text>

  <!-- Stomach (J-shaped) -->
  <path d="M 168 100 Q 155 110 155 130 Q 155 150 170 155 L 190 155 Q 210 150 210 130 Q 210 115 192 100 Z" fill="#0f172a" stroke="#f472b6" stroke-width="2.5" filter="url(#glow)"/>
  <text x="180" y="132" fill="#fda4af" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">পাকস্থলী</text>
  <!-- Rugae (stomach folds) -->
  <path d="M 162 115 Q 168 118 165 125" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.5"/>
  <path d="M 175 120 Q 180 123 177 130" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.5"/>

  <!-- Liver (right side, large) -->
  <path d="M 220 48 Q 260 40 300 48 Q 320 55 310 75 Q 300 95 270 90 Q 240 85 230 70 Q 220 60 220 48 Z" fill="#0f172a" stroke="#fb923c" stroke-width="2" filter="url(#glow-orange)"/>
  <text x="268" y="70" fill="#fdba74" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">যকৃৎ</text>

  <!-- Gall bladder -->
  <ellipse cx="240" cy="80" rx="8" ry="12" fill="none" stroke="#fde68a" stroke-width="1.5"/>
  <text x="228" y="96" fill="#fde68a" font-family="system-ui,sans-serif" font-size="6">পিত্ত</text>
  <text x="228" y="102" fill="#fde68a" font-family="system-ui,sans-serif" font-size="6">থলি</text>

  <!-- Pancreas -->
  <path d="M 130 155 Q 150 165 180 163 Q 210 160 230 155" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <text x="160" y="174" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="7">অগ্ন্যাশয়</text>

  <!-- Small intestine (convoluted) -->
  <path d="M 155 155 Q 140 170 150 185 Q 160 195 155 210 Q 148 220 160 225" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <path d="M 160 225 Q 170 230 180 225 Q 190 218 185 210" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <path d="M 185 210 Q 180 195 190 185 Q 200 178 195 170" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <path d="M 195 170 Q 190 160 200 158" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <text x="160" y="200" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="7">ক্ষুদ্রান্ত্র</text>

  <!-- Large intestine -->
  <path d="M 200 158 Q 220 155 230 165 Q 240 180 235 195 Q 228 215 215 222 Q 200 228 185 225 Q 175 222 170 215" fill="none" stroke="#f472b6" stroke-width="2.5"/>
  <text x="208" y="206" fill="#fda4af" font-family="system-ui,sans-serif" font-size="7">বৃহদন্ত্র</text>

  <!-- Appendix -->
  <path d="M 170 215 Q 160 220 155 228" fill="none" stroke="#f472b6" stroke-width="1.5"/>
  <ellipse cx="153" cy="232" rx="4" ry="3" fill="none" stroke="#f472b6" stroke-width="1.5"/>

  <!-- Rectum -->
  <rect x="164" y="225" width="10" height="8" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="145" y="232" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="6">মলাশয়</text>

  <text x="180" y="238" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">মানব পাচনতন্ত্র — Human Digestive System</text>
</svg>