<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="biology ssc science biology board questions year wise 2023 chattogram ts 19">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22d3ee" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="360" height="220" rx="14" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>
  
    <!-- Guard cells (two bean shapes) -->
    <path d="M165,60 C145,80 145,120 165,140 C175,120 175,80 165,60 Z" fill="#1e293b" stroke="#22d3ee" stroke-width="2.5" filter="url(#glow)"/>
    <path d="M195,60 C215,80 215,120 195,140 C185,120 185,80 195,60 Z" fill="#1e293b" stroke="#22d3ee" stroke-width="2.5" filter="url(#glow)"/>
    
    <!-- Stomatal pore -->
    <ellipse cx="180" cy="100" rx="8" ry="35" fill="#0f172a" stroke="#f472b6" stroke-width="1.5"/>
    
    <!-- Chloroplasts inside guard cells -->
    <circle cx="155" cy="90" r="3" fill="#34d399"/>
    <circle cx="157" cy="110" r="3" fill="#34d399"/>
    <circle cx="205" cy="90" r="3" fill="#34d399"/>
    <circle cx="203" cy="110" r="3" fill="#34d399"/>
    
    <!-- Labels -->
    <text x="120" y="105" fill="#fda4af" font-size="11" font-family="Segoe UI" text-anchor="end">রক্ষীকোষ (Guard Cell)</text>
    <text x="240" y="105" fill="#e2e8f0" font-size="11" font-family="Segoe UI">পত্ররন্ধ্র (Stoma)</text>
  
  <text x="180" y="208" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="11" text-anchor="middle">পত্ররন্ধ্র (Stomata) শারীরবৃত্তীয় প্রক্রিয়া</text>
</svg>
