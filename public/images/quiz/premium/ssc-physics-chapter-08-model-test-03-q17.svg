<svg width="1080" height="600" viewBox="0 0 1080 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ssc physics chapter 08 model test 03 q17">

  <defs>
    <!-- Dark UI background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="50%" stop-color="#0B1230"/>
      <stop offset="100%" stop-color="#120A2A"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2238"/>
      <stop offset="100%" stop-color="#121A2B"/>
    </linearGradient>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2EE6FF"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1080" height="600" fill="url(#bg)"/>

  <!-- MAIN CARD -->
  <rect x="90" y="60" width="900" height="480" rx="28"
        fill="url(#card)" stroke="#2B3550" stroke-width="2"/>

  <!-- dashed inner panel (like your screenshot) -->
  <rect x="150" y="120" width="780" height="360" rx="20"
        fill="none" stroke="#4A5A78" stroke-width="2"
        stroke-dasharray="10 10"/>

  <!-- PRINCIPAL AXIS -->
  <line x1="180" y1="300" x2="900" y2="300"
        stroke="#5B6B86" stroke-width="3"/>

  <!-- CONCAVE MIRROR -->
  <path d="M880 150 Q800 300 880 450"
        fill="none" stroke="#E0E6FF" stroke-width="5"/>

  <!-- C and F -->
  <circle cx="520" cy="300" r="6" fill="#4DA3FF"/>
  <text x="510" y="330" font-size="22" fill="#4DA3FF" font-family="Noto Sans Bengali, Arial, sans-serif">C</text>

  <circle cx="680" cy="300" r="6" fill="#4DA3FF"/>
  <text x="670" y="330" font-size="22" fill="#4DA3FF" font-family="Noto Sans Bengali, Arial, sans-serif">F</text>

  <!-- OBJECT -->
  <line x1="320" y1="300" x2="320" y2="210"
        stroke="#3DF28A" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="285" y="195" font-size="20" fill="#3DF28A" font-family="Noto Sans Bengali, Arial, sans-serif">বস্তু</text>

  <!-- IMAGE (inverted) -->
  <line x1="600" y1="300" x2="600" y2="380"
        stroke="#FF4D8D" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="555" y="410" font-size="20" fill="#FF4D8D" font-family="Noto Sans Bengali, Arial, sans-serif">প্রতিবিম্ব</text>

  <!-- RAYS -->
  <line x1="320" y1="210" x2="880" y2="210"
        stroke="#2EE6FF" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="880" y1="210" x2="600" y2="380"
        stroke="#2EE6FF" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="320" y1="210" x2="520" y2="300"
        stroke="#A66BFF" stroke-width="2"/>

</svg>
