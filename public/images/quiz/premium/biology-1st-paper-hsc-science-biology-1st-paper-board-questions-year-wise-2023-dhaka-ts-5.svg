  <g filter="url(#glow)">
        <path d="M100 75 C140 95,135 145,100 165" fill="none" stroke="#22d3ee" stroke-width="5"/>
        <path d="M260 75 C220 95,225 145,260 165" fill="none" stroke="#f472b6" stroke-width="5"/>
        <path d="M115 118 C150 140,210 96,245 118" fill="none" stroke="#fbbf24" stroke-width="3"/>
        <text x="180" y="196" text-anchor="middle" fill="#fde68a" font-size="10" font-family="Noto Sans Bengali, Arial">Crossing over → নতুন জিন বিন্যাস ও বৈচিত্র্য</text>
        </g>
  
</svg>