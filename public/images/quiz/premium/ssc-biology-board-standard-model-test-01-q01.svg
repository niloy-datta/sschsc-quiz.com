<svg width="100%" height="100%" viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="দুটি কোষীয় অঙ্গাণু - A ও B">
  <defs>
    <filter id="softGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="mitoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="chloroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" rx="16" fill="url(#bgGrad)"/>
  <rect x="8" y="8" width="384" height="244" rx="14" fill="#111c33" stroke="#334155" stroke-width="1"/>

  <!-- Title -->
  <text x="200" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#e5f4ff">কোষীয় অঙ্গাণু — A ও B</text>
  <text x="200" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">শিক্ষক দুটি অঙ্গাণুর কথা বলেছেন</text>

  <!-- === Organelle A (Mitochondria) === -->
  <g transform="translate(50, 65)">
    <!-- Outer membrane -->
    <ellipse cx="85" cy="80" rx="68" ry="42" fill="#2d1f0e" stroke="url(#mitoGrad)" stroke-width="2.5"/>
    <!-- Inner membrane with cristae folds -->
    <ellipse cx="85" cy="80" rx="58" ry="34" fill="none" stroke="#fcd34d" stroke-width="1.2" stroke-dasharray="6 3"/>
    <!-- Cristae (folded inner membrane) -->
    <path d="M45 70 Q60 58, 65 80 Q70 100, 85 80 Q100 60, 105 80 Q110 100, 125 78" fill="none" stroke="#facc15" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M50 85 Q65 73, 70 90 Q75 105, 90 85 Q105 68, 110 88" fill="none" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <!-- Label A -->
    <rect x="55" y="15" width="60" height="22" rx="6" fill="#fbbf24" opacity="0.15"/>
    <text x="85" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#fbbf24">A</text>
    <!-- Name -->
    <text x="85" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fde68a">মাইটোকন্ড্রিয়া</text>
    <!-- Function -->
    <text x="85" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24">শক্তি উৎপাদন (ATP)</text>
    <!-- Energy sparks -->
    <circle cx="65" cy="75" r="2.5" fill="#facc15" opacity="0.7" filter="url(#softGlow)"/>
    <circle cx="105" cy="72" r="2" fill="#fde68a" opacity="0.6" filter="url(#softGlow)"/>
    <circle cx="85" cy="68" r="1.8" fill="#fef3c7" opacity="0.5" filter="url(#softGlow)"/>
  </g>

  <!-- === Divider === -->
  <line x1="200" y1="75" x2="200" y2="215" stroke="#475569" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="200" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">দুটি ভিন্ন অঙ্গাণু</text>

  <!-- === Organelle B (Chloroplast) === -->
  <g transform="translate(215, 65)">
    <!-- Outer membrane -->
    <ellipse cx="85" cy="80" rx="68" ry="42" fill="#0d2918" stroke="url(#chloroGrad)" stroke-width="2.5"/>
    <!-- Inner membrane -->
    <ellipse cx="85" cy="80" rx="58" ry="34" fill="none" stroke="#86efac" stroke-width="1" opacity="0.5"/>
    <!-- Thylakoid stacks (grana) -->
    <g transform="translate(40, 55)">
      <!-- Granum 1 -->
      <rect x="0" y="0" width="30" height="6" rx="3" fill="#22c55e" opacity="0.8"/>
      <rect x="0" y="8" width="30" height="6" rx="3" fill="#16a34a" opacity="0.7"/>
      <rect x="0" y="16" width="30" height="6" rx="3" fill="#22c55e" opacity="0.8"/>
      <rect x="0" y="24" width="30" height="6" rx="3" fill="#16a34a" opacity="0.7"/>
      <rect x="0" y="32" width="30" height="6" rx="3" fill="#22c55e" opacity="0.6"/>
    </g>
    <!-- Granum 2 -->
    <g transform="translate(100, 55)">
      <rect x="0" y="5" width="30" height="6" rx="3" fill="#22c55e" opacity="0.8"/>
      <rect x="0" y="13" width="30" height="6" rx="3" fill="#16a34a" opacity="0.7"/>
      <rect x="0" y="21" width="30" height="6" rx="3" fill="#22c55e" opacity="0.8"/>
      <rect x="0" y="29" width="30" height="6" rx="3" fill="#16a34a" opacity="0.7"/>
    </g>
    <!-- Stroma connections (lamellae) -->
    <line x1="70" y1="72" x2="100" y2="76" stroke="#86efac" stroke-width="1" opacity="0.5"/>
    <line x1="70" y1="84" x2="100" y2="80" stroke="#86efac" stroke-width="1" opacity="0.5"/>
    <!-- Label B -->
    <rect x="55" y="15" width="60" height="22" rx="6" fill="#34d399" opacity="0.15"/>
    <text x="85" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#34d399">B</text>
    <!-- Name -->
    <text x="85" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#a7f3d0">ক্লোরোপ্লাস্ট</text>
    <!-- Function -->
    <text x="85" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34d399">শালোকসংশ্লেষণ</text>
    <!-- Sun rays hint -->
    <circle cx="70" cy="65" r="3" fill="#fde047" opacity="0.4" filter="url(#softGlow)"/>
    <circle cx="100" cy="68" r="2.5" fill="#facc15" opacity="0.35" filter="url(#softGlow)"/>
  </g>

  <!-- Question hint at bottom -->
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">A: শক্তি উৎপাদনকারী · B: খাদ্য তৈরিতে সাহায্যকারী</text>
</svg>