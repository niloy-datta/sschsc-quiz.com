<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="অসম্পৃক্ত যৌগ ও Br₂ পরীক্ষা">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">অসম্পৃক্ত যৌগ ও Br₂ পরীক্ষা</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">Double bond identification</text>
  <g filter="url(#glow)">
    <text x="92" y="96" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="Arial">C=C</text>
    <text x="180" y="96" text-anchor="middle" fill="#f87171" font-size="15" font-family="Arial">+ Br₂</text>
    <line x1="215" y1="92" x2="265" y2="92" stroke="#67e8f9" stroke-width="2" marker-end="url(#arrow)" />
    <text x="294" y="96" text-anchor="middle" fill="#dcfce7" font-size="13" font-family="Arial">Br-C-C-Br</text>
    <text x="180" y="142" text-anchor="middle" fill="#fef3c7" font-size="11" font-family="Noto Sans Bengali, Arial">Br₂-এর লাল/বাদামী বর্ণ অপসারণ</text>
    <path d="M92 132 C120 168,150 132,178 168 C206 132,236 168,264 132" fill="none" stroke="#a3e635" stroke-width="3"/>
    <text x="180" y="190" text-anchor="middle" fill="#bbf7d0" font-size="10" font-family="Noto Sans Bengali, Arial">পলিমার গঠনে সক্ষম অসম্পৃক্ত যৌগ</text>
  </g>
  
</svg>