<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="C₄ উদ্ভিদের দুই-ধাপীয় পথ">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">C₄ উদ্ভিদের দুই-ধাপীয় পথ</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">উচ্চ তাপসহনশীলতা + দুই ধরনের ক্লোরোপ্লাস্ট</text>
  
  <g>
    <rect x="45" y="78" width="110" height="85" rx="18" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
    <rect x="205" y="78" width="110" height="85" rx="18" fill="#064e3b" stroke="#a3e635" stroke-width="2"/>
    <text x="100" y="102" text-anchor="middle" fill="#bbf7d0" font-size="10" font-family="Noto Sans Bengali, Arial">মেসোফিল কোষ</text>
    <text x="260" y="102" text-anchor="middle" fill="#ecfccb" font-size="10" font-family="Noto Sans Bengali, Arial">বান্ডল শীথ কোষ</text>
    <circle cx="100" cy="132" r="17" fill="none" stroke="#34d399" stroke-width="3"/>
    <circle cx="260" cy="132" r="17" fill="none" stroke="#bef264" stroke-width="3"/>
    {arrow_line(155,120,205,120,"#67e8f9",2)}
    <text x="180" y="112" text-anchor="middle" fill="#fef3c7" font-size="9" font-family="Noto Sans Bengali, Arial">C₄ পথ</text>
    <text x="180" y="184" text-anchor="middle" fill="#86efac" font-size="10" font-family="Noto Sans Bengali, Arial">দুই ধরনের ক্লোরোপ্লাস্ট → উচ্চ উৎপাদনশীলতা</text>
  </g>
  
</svg>