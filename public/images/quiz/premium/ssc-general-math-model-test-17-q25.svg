<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="কোণ সমদ্বিখণ্ডক">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">কোণ সমদ্বিখণ্ডক</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">M ও N ছেদবিন্দু</text>
  <g filter="url(#glow)">
    <polygon points="80,72 270,64 300,170 95,178" fill="none" stroke="#22d3ee" stroke-width="3"/>
    <circle cx="80" cy="72" r="4" fill="#fff"/><text x="70" y="64" fill="#fff" font-size="11">P</text>
    <circle cx="270" cy="64" r="4" fill="#fff"/><text x="278" y="60" fill="#fff" font-size="11">Q</text>
    <circle cx="300" cy="170" r="4" fill="#fff"/><text x="306" y="180" fill="#fff" font-size="11">R</text>
    <circle cx="95" cy="178" r="4" fill="#fff"/><text x="82" y="191" fill="#fff" font-size="11">S</text>
    <line x1="80" y1="72" x2="176" y2="110" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 4"/>
    <line x1="270" y1="64" x2="176" y2="110" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 4"/>
    <circle cx="176" cy="110" r="4" fill="#fbbf24"/><text x="181" y="104" fill="#fef3c7" font-size="11">M</text>
    <line x1="270" y1="64" x2="190" y2="145" stroke="#a3e635" stroke-width="2" stroke-dasharray="4 4"/>
    <line x1="80" y1="72" x2="190" y2="145" stroke="#a3e635" stroke-width="2" stroke-dasharray="4 4"/>
    <circle cx="190" cy="145" r="4" fill="#a3e635"/><text x="197" y="149" fill="#dcfce7" font-size="11">N</text>
