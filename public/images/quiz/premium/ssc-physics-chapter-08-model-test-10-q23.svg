    <line x1="180" y1="47" x2="248" y2="132" stroke="#38bdf8" stroke-width="2"/>
    <path d="M157 75 A35 35 0 0 1 203 75" fill="none" stroke="#f472b6" stroke-width="3"/>
    <text x="180" y="200" text-anchor="middle" fill="#bfdbfe" font-size="10" font-family="Noto Sans Bengali, Arial">অবতল দর্পণে বস্তু বক্রতার কেন্দ্রে থাকলে প্রতিব…</text>
