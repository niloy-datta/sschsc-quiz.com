  <g filter="url(#glow)">
    <circle cx="180" cy="115" r="70" fill="none" stroke="#22d3ee" stroke-width="3"/>
    <circle cx="180" cy="115" r="4" fill="#fff"/><text x="191" y="112" text-anchor="start" fill="#fff" font-size="10" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">O</text>
    <circle cx="112" cy="132" r="4" fill="#fff"/><text x="100" y="148" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">P</text>
    <circle cx="248" cy="132" r="4" fill="#fff"/><text x="260" y="148" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">Q</text>
    <circle cx="180" cy="47" r="4" fill="#fff"/><text x="180" y="37" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">S</text>
    <line x1="112" y1="132" x2="248" y2="132" stroke="#a3e635" stroke-width="2.5"/>
