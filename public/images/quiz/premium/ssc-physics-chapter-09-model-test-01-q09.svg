<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ট্রান্সফর্মার">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">ট্রান্সফর্মার</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">Primary and secondary coil</text>
  <g filter="url(#glow)">
    <line x1="180" y1="60" x2="180" y2="170" stroke="#94a3b8" stroke-width="8"/>
    <path d="M90 70 C55 80,55 150,90 160" fill="none" stroke="#22d3ee" stroke-width="4"/>
    <path d="M270 70 C310 80,310 150,270 160" fill="none" stroke="#f472b6" stroke-width="4"/>
    <g stroke="#22d3ee" stroke-width="2" fill="none"><circle cx="110" cy="90" r="12"/><circle cx="110" cy="118" r="12"/><circle cx="110" cy="146" r="12"/></g>
    <g stroke="#f472b6" stroke-width="2" fill="none"><circle cx="250" cy="84" r="9"/><circle cx="250" cy="106" r="9"/><circle cx="250" cy="128" r="9"/><circle cx="250" cy="150" r="9"/></g>
    <text x="110" y="190" text-anchor="middle" fill="#bae6fd" font-size="10" font-family="Noto Sans Bengali, Arial">Primary Np</text>
    <text x="250" y="190" text-anchor="middle" fill="#fbcfe8" font-size="10" font-family="Noto Sans Bengali, Arial">Secondary Ns</text>
  </g>
  
</svg>