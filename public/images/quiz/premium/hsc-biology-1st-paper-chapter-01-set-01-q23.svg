<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" role="img" aria-label="hsc biology 1st paper chapter 01 set 01 q23">
  <style>
  @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes flow { 0% { stroke-dashoffset: 20; } 100% { stroke-dashoffset: 0; } }
  @keyframes breathe { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
  @keyframes fade-in { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; } }
  .anim-pulse { animation: pulse 2.5s ease-in-out infinite; }
  .anim-flow { stroke-dasharray: 6 4; animation: flow 1s linear infinite; }
  .anim-breathe { animation: breathe 3s ease-in-out infinite; }
  .anim-fade { animation: fade-in 0.6s ease-out forwards; opacity: 0; }
  .delay-1 { animation-delay: 0.2s; }
  .delay-2 { animation-delay: 0.4s; }
  .delay-3 { animation-delay: 0.6s; }
</style>
  <defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/>
  </linearGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feFlood flood-color="#22d3ee" flood-opacity="0.45"/>
    <feComposite in2="blur" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="#22d3ee"/>
  </marker>
</defs>
  <rect width="900" height="520" fill="url(#bgGrad)" rx="16"/>
  
    <g class="anim-fade">
      <!-- Cell membrane -->
      <ellipse cx="300" cy="220" rx="140" ry="120" 
               fill="none" stroke="#22d3ee" stroke-width="3" class="anim-breathe"/>
      <!-- Nucleus -->
      <ellipse cx="330" cy="200" rx="45" ry="35" 
               fill="#1e293b" stroke="#f472b6" stroke-width="2" class="anim-pulse"/>
      <text x="330" y="205" fill="#f472b6" font-size="12" text-anchor="middle" font-family="Noto Sans Bengali, Arial, sans-serif">নিউক্লিয়াস</text>
      <!-- Mitochondria -->
      <ellipse cx="240" cy="170" rx="35" ry="18" 
               fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,2" class="anim-flow"/>
      <text x="240" y="155" fill="#fbbf24" font-size="10" text-anchor="middle" font-family="Noto Sans Bengali, Arial, sans-serif">মাইটোকন্ড্রিয়া</text>
      <!-- Nucleolus -->
      <circle cx="335" cy="195" r="12" fill="#f472b6" opacity="0.3" class="anim-pulse delay-2"/>
      <!-- Labels -->
      <text x="180" y="270" fill="#94a3b8" font-size="11" class="anim-fade delay-1" font-family="Noto Sans Bengali, Arial, sans-serif">কোষপর্দা</text>
      <text x="360" y="270" fill="#94a3b8" font-size="11" class="anim-fade delay-2" font-family="Noto Sans Bengali, Arial, sans-serif">সাইটোপ্লাজম</text>
      <!-- Golgi -->
      <g transform="translate(380,160)">
        <path d="M0,0 Q15,-10 30,0 Q45,10 60,0" fill="none" stroke="#34d399" stroke-width="2" class="anim-breathe"/>
        <path d="M5,6 Q20,-4 35,6 Q50,16 65,6" fill="none" stroke="#34d399" stroke-width="1.5" class="anim-breathe delay-1"/>
        <text x="20" y="24" fill="#34d399" font-size="9" font-family="Noto Sans Bengali, Arial, sans-serif">গলজি</text>
      </g>
    </g>
  
  <text x="450" y="490" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">জীববিজ্ঞান চিত্র · কোষ · গঠন</text>
</svg>