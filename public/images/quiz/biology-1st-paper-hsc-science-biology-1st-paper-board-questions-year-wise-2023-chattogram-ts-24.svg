<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <linearGradient id="dna" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#38bdf8" flood-opacity=".65"/>
    </filter>

    <style>
      .ring{fill:none;stroke:url(#dna);stroke-width:9;stroke-linecap:round;filter:url(#glow)}
      .inner{fill:none;stroke:#e0f2fe;stroke-width:1.5;opacity:.75}
      .bridge{stroke:#fef3c7;stroke-width:2;stroke-linecap:round;opacity:.8}
      .dot{fill:#fef3c7}
    </style>
  </defs>

  <rect width="360" height="220" rx="18" fill="url(#bg)"/>

  <ellipse cx="180" cy="112" rx="102" ry="55" class="ring"/>
  <ellipse cx="180" cy="112" rx="72" ry="38" class="inner"/>

  <path d="M100 100 C135 75 225 75 260 100" class="bridge"/>
  <path d="M100 124 C135 150 225 150 260 124" class="bridge"/>
  <path d="M130 72 C150 102 150 124 130 153" class="bridge"/>
  <path d="M230 72 C210 102 210 124 230 153" class="bridge"/>

  <circle cx="100" cy="112" r="5" class="dot"/>
  <circle cx="260" cy="112" r="5" class="dot"/>
  <circle cx="180" cy="57" r="5" class="dot"/>
  <circle cx="180" cy="167" r="5" class="dot"/>
</svg>
