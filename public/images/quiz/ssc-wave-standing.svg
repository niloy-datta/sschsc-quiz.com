<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="ssc wave standing">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill:#0f172a; }
      .label { font: 600 22px Arial, sans-serif; fill:#0f172a; }
      .small { font: 500 18px Arial, sans-serif; fill:#334155; }
      .axis { stroke:#0f172a; stroke-width:3; }
      .wave { fill:none; stroke:#2563eb; stroke-width:5; }
      .dim { stroke:#ea580c; stroke-width:3; fill:none; marker-start:url(#arrow); marker-end:url(#arrow); }
      .guide { stroke:#94a3b8; stroke-width:2; stroke-dasharray:8 8; }
      .point { fill:#0f172a; }
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="660" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="70" class="title" font-family="Noto Sans Bengali, Arial, sans-serif">Standing Wave  A to H</text>
  <line x1="110" y1="360" x2="1090" y2="360" class="axis"/>
  <text x="915" y="335" class="small" font-family="Noto Sans Bengali, Arial, sans-serif">Equilibrium line</text>
  <path d="M140 360 C190 360, 220 210, 270 210 C320 210, 350 360, 400 360 C450 360, 480 510, 530 510 C580 510, 610 360, 660 360 C710 360, 740 210, 790 210 C840 210, 870 360, 920 360 C970 360, 1000 510, 1050 510" class="wave"/>
  <circle cx="140" cy="360" r="6" class="point"/><text x="132" y="392" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">A</text>
  <circle cx="270" cy="210" r="6" class="point"/><text x="260" y="188" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">B</text>
  <circle cx="400" cy="360" r="6" class="point"/><text x="392" y="392" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">C</text>
  <circle cx="530" cy="510" r="6" class="point"/><text x="520" y="540" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">D</text>
  <circle cx="660" cy="360" r="6" class="point"/><text x="652" y="392" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">E</text>
  <circle cx="790" cy="210" r="6" class="point"/><text x="782" y="188" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">F</text>
  <circle cx="920" cy="360" r="6" class="point"/><text x="910" y="392" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">G</text>
  <circle cx="1050" cy="510" r="6" class="point"/><text x="1042" y="540" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">H</text>
  <line x1="140" y1="125" x2="270" y2="125" class="dim"/>
  <line x1="140" y1="140" x2="140" y2="340" class="guide"/>
  <line x1="270" y1="140" x2="270" y2="190" class="guide"/>
  <text x="176" y="112" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">AB = 200 cm</text>
  <line x1="140" y1="585" x2="530" y2="585" class="dim"/>
  <line x1="140" y1="560" x2="140" y2="380" class="guide"/>
  <line x1="530" y1="560" x2="530" y2="530" class="guide"/>
  <text x="232" y="618" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">A to D travel time = 0.025 s</text>
  <line x1="790" y1="210" x2="790" y2="510" class="guide"/>
  <circle cx="790" cy="210" r="5" fill="#ea580c"/>
  <circle cx="790" cy="360" r="5" fill="#ea580c"/>
  <circle cx="790" cy="510" r="5" fill="#ea580c"/>
  <text x="808" y="217" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">M</text>
  <text x="808" y="367" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">N</text>
  <text x="808" y="517" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">H</text>
  <line x1="860" y1="210" x2="860" y2="360" class="dim"/>
  <line x1="860" y1="360" x2="860" y2="510" class="dim"/>
  <text x="878" y="292" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">MN = 0.5 m</text>
  <text x="878" y="442" class="label" font-family="Noto Sans Bengali, Arial, sans-serif">NH = 0.5 m</text>
</svg>
