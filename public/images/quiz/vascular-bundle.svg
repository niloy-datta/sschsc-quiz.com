<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="vascular bundle">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="xylem-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="phloem-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="cambium-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <style>
      @keyframes glow-pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
      .xylem-pulse { animation:glow-pulse 3s ease-in-out infinite; }
      .phloem-pulse { animation:glow-pulse 3s ease-in-out infinite; animation-delay:1s; }
    </style>
  </defs>

  <rect width="400" height="260" rx="16" fill="url(#bg)" stroke="#1e293b" stroke-width="1.5"/>

  <text x="200" y="22" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" font-weight="bold" filter="url(#glow)">ভাস্কুলার বান্ডলের প্রকারভেদ</text>

  <!-- Type 1: Open Collateral -->
  <rect x="10" y="30" width="115" height="95" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="67" y="44" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">মুক্ত সমপার্শ্বীয়</text>
  <rect x="20" y="50" width="30" height="65" rx="4" fill="#1e293b" stroke="#22d3ee" stroke-width="2" class="xylem-pulse"/>
  <text x="35" y="78" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="6" text-anchor="middle">X</text>
  <rect x="52" y="50" width="8" height="65" rx="2" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="56" y="78" fill="#86efac" font-family="system-ui,sans-serif" font-size="5" text-anchor="middle">C</text>
  <rect x="62" y="50" width="30" height="65" rx="4" fill="#1e293b" stroke="#f472b6" stroke-width="2" class="phloem-pulse"/>
  <text x="77" y="78" fill="#fda4af" font-family="system-ui,sans-serif" font-size="6" text-anchor="middle">P</text>

  <!-- Type 2: Closed Collateral -->
  <rect x="142" y="30" width="115" height="95" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="200" y="44" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">বদ্ধ সমপার্শ্বীয়</text>
  <rect x="155" y="50" width="30" height="65" rx="4" fill="#1e293b" stroke="#22d3ee" stroke-width="2" class="xylem-pulse"/>
  <text x="170" y="78" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="6" text-anchor="middle">X</text>
  <rect x="187" y="50" width="30" height="65" rx="4" fill="#1e293b" stroke="#f472b6" stroke-width="2" class="phloem-pulse"/>
  <text x="202" y="78" fill="#fda4af" font-family="system-ui,sans-serif" font-size="6" text-anchor="middle">P</text>
  <line x1="187" y1="50" x2="187" y2="115" stroke="#475569" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="185" y="120" fill="#64748b" font-family="system-ui,sans-serif" font-size="5" text-anchor="middle">(ক্যাম্বিয়াম নেই)</text>

  <!-- Type 3: Bicollateral -->
  <rect x="274" y="30" width="115" height="95" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="332" y="44" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8" text-anchor="middle">দ্বি-সমপার্শ্বীয়</text>
  <rect x="284" y="50" width="22" height="65" rx="3" fill="#1e293b" stroke="#f472b6" stroke-width="2" class="phloem-pulse"/>
  <text x="295" y="78" fill="#fda4af" font-family="system-ui,sans-serif" font-size="5" text-anchor="middle">P</text>
  <rect x="308" y="50" width="24" height="65" rx="3" fill="#1e293b" stroke="#22d3ee" stroke-width="2" class="xylem-pulse"/>
  <text x="320" y="78" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="5" text-anchor="middle">X</text>
  <rect x="334" y="50" width="22" height="65" rx="3" fill="#1e293b" stroke="#f472b6" stroke-width="2" class="phloem-pulse"/>
  <text x="345" y="78" fill="#fda4af" font-family="system-ui,sans-serif" font-size="5" text-anchor="middle">P</text>

  <!-- Legend row -->
  <rect x="15" y="135" width="370" height="50" rx="8" fill="#131a36" stroke="#1e293b" stroke-width="1"/>

  <rect x="25" y="143" width="12" height="12" rx="2" fill="#22d3ee" opacity="0.8"/>
  <text x="40" y="153" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="9">X = জাইলেম</text>

  <rect x="25" y="160" width="12" height="12" rx="2" fill="#f472b6" opacity="0.8"/>
  <text x="40" y="170" fill="#fda4af" font-family="system-ui,sans-serif" font-size="9">P = ফ্লোয়েম</text>

  <rect x="145" y="143" width="12" height="12" rx="2" fill="#34d399" opacity="0.8"/>
  <text x="160" y="153" fill="#86efac" font-family="system-ui,sans-serif" font-size="9">C = ক্যাম্বিয়াম</text>

  <!-- Additional info -->
  <rect x="145" y="160" width="12" height="12" rx="2" fill="#475569" opacity="0.6"/>
  <text x="160" y="170" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">ক্যাম্বিয়াম উপস্থিত/অনুপস্থিত</text>

  <!-- Bottom badge -->
  <rect x="15" y="192" width="370" height="58" rx="8" fill="#131a36" stroke="#334155" stroke-width="1"/>

  <!-- Examples -->
  <text x="200" y="208" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" font-weight="bold">উদাহরণ</text>

  <text x="30" y="224" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">
মুক্ত সমপার্শ্বীয়: Dicot stem (সূর্যমুখী)
</text>
  <text x="30" y="236" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">
বদ্ধ সমপার্শ্বীয়: Monocot stem (ধান, গম)
</text>
  <text x="30" y="248" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">
দ্বি-সমপার্শ্বীয়: Cucurbita (কুমড়া) stem
</text>
</svg>