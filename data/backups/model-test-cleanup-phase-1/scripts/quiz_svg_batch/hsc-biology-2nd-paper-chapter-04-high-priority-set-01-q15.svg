    </radialGradient>
    <filter id="g">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#38bdf8" flood-opacity=".75"/>
    </filter>
    <style>
      .line{fill:none;stroke:#38bdf8;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;filter:url(#g)}
