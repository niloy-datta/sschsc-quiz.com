<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22d3ee" flood-opacity=".7"/>
    </filter>
    <style>
      .grid{stroke:#334155;stroke-width:1;opacity:.7}
      .wave{fill:none;stroke:#22d3ee;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}
      .tmark{fill:#facc15;stroke:#fff7ed;stroke-width:2}
      .label{font-family:Arial,sans-serif;font-size:18px;font-weight:900;fill:#fff}
      .small{font-family:Arial,sans-serif;font-size:12px;font-weight:700;fill:#cbd5e1}
    </style>
  </defs>

  <rect width="360" height="220" rx="18" fill="url(#bg)"/>

  <g opacity=".65">
    <line x1="35" y1="60" x2="325" y2="60" class="grid"/>
    <line x1="35" y1="100" x2="325" y2="100" class="grid"/>
    <line x1="35" y1="140" x2="325" y2="140" class="grid"/>
    <line x1="35" y1="180" x2="325" y2="180" class="grid"/>
    <line x1="70" y1="35" x2="70" y2="185" class="grid"/>
    <line x1="130" y1="35" x2="130" y2="185" class="grid"/>
    <line x1="190" y1="35" x2="190" y2="185" class="grid"/>
    <line x1="250" y1="35" x2="250" y2="185" class="grid"/>
    <line x1="310" y1="35" x2="310" y2="185" class="grid"/>
  </g>

  <path d="M35 130 L78 130
           Q90 100 102 130
           L120 130
           L136 70
           L154 162
           L174 130
           L220 130
           Q245 92 270 130
           T320 130" class="wave"/>

  <circle cx="270" cy="130" r="8" class="tmark"/>
  <text x="270" y="88" text-anchor="middle" class="label">T</text>
  <text x="180" y="205" text-anchor="middle" class="small">ECG waveform</text>
</svg>