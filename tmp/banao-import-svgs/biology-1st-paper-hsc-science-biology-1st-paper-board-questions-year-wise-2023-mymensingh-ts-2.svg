<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <style>
  @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes flow { 0% { stroke-dashoffset: 20; } 100% { stroke-dashoffset: 0; } }
  @keyframes breathe { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
  @keyframes fade-in { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; } }
  .anim-pulse { animation: pulse 2.5s ease-in-out infinite; }
  .anim-flow { stroke-dasharray: 6 4; animation: flow 1s linear infinite; }
  .anim-breathe { animation: breathe 3s ease-in-out infinite; }
  .anim-fade { animation: fade-in 0.6s ease-out forwards; opacity: 0; }
  .delay-1 { animation-delay: 0.2s; }
  .delay-2 { animation-delay: 0.4s; }
  .delay-3 { animation-delay: 0.6s; }
</style>
  <defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/>
  </linearGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
    <feFlood flood-color="#22d3ee" flood-opacity="0.45"/>
    <feComposite in2="blur" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0 L10 5 L0 10 z" fill="#22d3ee"/>
  </marker>
</defs>
  <rect width="900" height="520" fill="url(#bgGrad)" rx="16"/>
  
    <g class="anim-fade">
      <!-- Equilibrium line -->
      <line x1="100" y1="230" x2="800" y2="230" stroke="#475569" stroke-width="1" stroke-dasharray="5,5"/>
      <!-- Wave -->
      <path d="M 130,230 L 140,217.4565844078816 L 150,205.05059710186887 L 160,192.91796067500633 L 170,181.19160283090397 L 180,170 L 190,159.46576972490323 L 200,149.70432723693702 L 210,140.8226209427127 L 220,132.9179606750063 L 230,126.07695154586737 L 240,120.37454508288789 L 250,115.87321804458158 L 260,112.62228791194333 L 270,110.6573725558072 L 280,110 L 290,110.65737255580719 L 300,112.62228791194332 L 310,115.87321804458156 L 320,120.37454508288788 L 330,126.07695154586736 L 340,132.9179606750063 L 350,140.8226209427127 L 360,149.704327236937 L 370,159.46576972490323 L 380,170 L 390,181.19160283090395 L 400,192.9179606750063 L 410,205.05059710186887 L 420,217.45658440788156 L 430,229.99999999999997 L 440.00000000000006,242.54341559211838 L 450,254.9494028981311 L 460,267.08203932499373 L 470,278.808397169096 L 480,290 L 490,300.5342302750968 L 500,310.29567276306295 L 510,319.1773790572873 L 520,327.0820393249937 L 530,333.92304845413264 L 540,339.6254549171121 L 550,344.12678195541844 L 560,347.3777120880567 L 570,349.34262744419283 L 580,350 L 590,349.34262744419283 L 600,347.3777120880567 L 610,344.12678195541844 L 620,339.6254549171121 L 630,333.92304845413264 L 640,327.08203932499373 L 650,319.17737905728734 L 660,310.29567276306295 L 670,300.5342302750968 L 680,290.00000000000006 L 690,278.808397169096 L 700,267.08203932499373 L 710,254.94940289813118 L 720,242.5434155921184 L 730,230.00000000000003" stroke="#22d3ee" stroke-width="3" fill="none" class="anim-flow"/>
      <!-- Amplitude arrow -->
      <line x1="250" y1="110" x2="250" y2="230" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arrow)"/>
      <text x="260" y="165" fill="#f472b6" font-size="13">A</text>
      <!-- Wavelength arrow -->
      <line x1="130" y1="280" x2="490" y2="280" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="130" y1="275" x2="130" y2="285" stroke="#34d399" stroke-width="2"/>
      <line x1="490" y1="275" x2="490" y2="285" stroke="#34d399" stroke-width="2"/>
      <text x="310" y="305" fill="#34d399" font-size="13" text-anchor="middle">λ</text>
      <!-- Crest / trough markers -->
      <circle cx="250" cy="110" r="5" fill="#fbbf24" class="anim-pulse"/>
      <text x="240" y="95" fill="#fbbf24" font-size="11">চূড়া</text>
      <circle cx="430" cy="350" r="5" fill="#fb923c" class="anim-pulse delay-2"/>
      <text x="420" y="370" fill="#fb923c" font-size="11">পাদ</text>
      <!-- Propagation arrow -->
      <text x="700" y="150" fill="#94a3b8" font-size="11">→ দিক</text>
    </g>
  
  <text x="450" y="490" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">তরঙ্গ · λ · A</text>
</svg>