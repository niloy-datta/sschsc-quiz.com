<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ভেক্টর রাশি / ভেক্টর যোগ">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">ভেক্টর রাশি / ভেক্টর যোগ</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">দিক + মান সহ arrow representation</text>
  <g filter="url(#glow)">
    <line x1="70" y1="160" x2="300" y2="160" stroke="#334155" stroke-width="1"/>
    <line x1="90" y1="180" x2="90" y2="50" stroke="#334155" stroke-width="1"/>
    <circle cx="90" cy="160" r="4" fill="#e0f2fe"/>
    <line x1="90" y1="160" x2="245" y2="80" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrow)" /><line x1="90" y1="160" x2="190" y2="160" stroke="#a3e635" stroke-width="3" marker-end="url(#arrow)" /><line x1="190" y1="160" x2="245" y2="80" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow)" />
    <text x="250" y="78" fill="#e0f2fe" font-size="12" font-family="Arial">A+B</text>
    <text x="140" y="151" fill="#dcfce7" font-size="11" font-family="Arial">A</text>
    <text x="217" y="122" fill="#fef3c7" font-size="11" font-family="Arial">B</text>
  </g>
  
</svg>