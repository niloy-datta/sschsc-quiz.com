<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="সরলরেখা ও x-অক্ষের কোণ">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">সরলরেখা ও x-অক্ষের কোণ</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">Coordinate geometry</text>
  <g filter="url(#glow)">
    <line x1="60" y1="160" x2="310" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="90" y1="190" x2="90" y2="55" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M 80 170 L 275 70" stroke="#22d3ee" stroke-width="4" fill="none"/>
    <path d="M120 160 A38 38 0 0 1 150 136" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <text x="175" y="76" text-anchor="middle" fill="#e0f2fe" font-size="13" font-family="Noto Sans Bengali, Arial">3y = 3x + 1</text>
    <text x="155" y="185" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Noto Sans Bengali, Arial">θ = 45°</text>
    <text x="245" y="90" fill="#bae6fd" font-size="10" font-family="Noto Sans Bengali, Arial">ঢাল = 1</text>
  </g>
  
</svg>