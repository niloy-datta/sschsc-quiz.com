<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ম্যাট্রিক্স উদ্দীপক">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">ম্যাট্রিক্স উদ্দীপক</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">Matrix / determinant visual aid</text>
  <g filter="url(#glow)">
    <text x="180" y="80" text-anchor="middle" fill="#e0f2fe" font-size="18" font-family="serif">M = [ 1  -2 ; 2  -3 ]</text>
    <rect x="100" y="105" width="160" height="54" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="180" y="128" text-anchor="middle" fill="#fef3c7" font-size="12" font-family="Noto Sans Bengali, Arial">Adjoint / determinant</text>
    <text x="180" y="148" text-anchor="middle" fill="#bfdbfe" font-size="10" font-family="Noto Sans Bengali, Arial">প্রধান কর্ণ swap, অপর কর্ণ sign change</text>
  </g>
  
</svg>