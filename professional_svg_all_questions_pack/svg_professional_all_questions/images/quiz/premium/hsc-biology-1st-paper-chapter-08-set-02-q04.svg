<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="পাতার পত্ররন্ধ্র">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">পাতার পত্ররন্ধ্র</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">Guard cells and stomatal pore</text>
  
  <g filter="url(#glow)">
    <ellipse cx="145" cy="120" rx="38" ry="58" fill="#064e3b" stroke="#34d399" stroke-width="2.5"/>
    <ellipse cx="215" cy="120" rx="38" ry="58" fill="#064e3b" stroke="#34d399" stroke-width="2.5"/>
    <ellipse cx="180" cy="120" rx="18" ry="54" fill="#020617" stroke="#a3e635" stroke-width="1.5"/>
    <circle cx="145" cy="103" r="5" fill="#bef264"/><circle cx="215" cy="138" r="5" fill="#bef264"/>
    <text x="180" y="55" text-anchor="middle" fill="#dcfce7" font-size="13" font-weight="700" font-family="Noto Sans Bengali, Arial">পত্ররন্ধ্র</text>
    <text x="180" y="188" text-anchor="middle" fill="#bbf7d0" font-size="10" font-family="Noto Sans Bengali, Arial">রক্ষীকোষ + গ্যাসের আদান-প্রদান + প্রস্বেদন</text>
