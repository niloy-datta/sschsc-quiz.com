<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="কোষ বিভাজন: সাইটোকাইনেসিস">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">কোষ বিভাজন: সাইটোকাইনেসিস</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">কোষদেহ বিভাজনের ধাপ</text>
  
  <g filter="url(#glow)">
    <ellipse cx="120" cy="120" rx="55" ry="38" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
    <ellipse cx="240" cy="120" rx="55" ry="38" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
    <line x1="180" y1="82" x2="180" y2="158" stroke="#facc15" stroke-width="4" stroke-dasharray="5 5"/>
    <text x="180" y="73" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Noto Sans Bengali, Arial">X: সাইটোকাইনেসিস</text>
    <circle cx="105" cy="120" r="12" fill="#f472b6"/><circle cx="255" cy="120" r="12" fill="#f472b6"/>
    <text x="180" y="184" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="Noto Sans Bengali, Arial">ঘটনা না হলে অপত্য কোষ পৃথক হয় না</text>
  </g>
  
</svg>