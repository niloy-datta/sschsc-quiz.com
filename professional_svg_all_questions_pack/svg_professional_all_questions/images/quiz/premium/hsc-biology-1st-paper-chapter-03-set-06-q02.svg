    <ellipse cx="255" cy="120" rx="52" ry="33" fill="#064e3b" stroke="#34d399" stroke-width="2.5"/>
    <ellipse cx="255" cy="120" rx="44" ry="26" fill="none" stroke="#86efac" stroke-width="1.5" opacity=".75"/>
    <g stroke="#bef264" stroke-width="3" stroke-linecap="round">
