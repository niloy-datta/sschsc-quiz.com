  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">অঙ্গাণু: মাইটোকন্ড্রিয়া ও ক্লোরোপ্লাস্ট</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">দ্বি-স্তরী ঝিল্লি + শক্তি রূপান্তর</text>
  
  <g>
    <ellipse cx="105" cy="120" rx="48" ry="31" fill="#123b54" stroke="#22d3ee" stroke-width="2.5"/>
    <ellipse cx="105" cy="120" rx="40" ry="24" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity=".7"/>
    <path d="M72 122 C88 104, 100 136, 118 115 C132 99, 143 130, 154 114" fill="none" stroke="#fbbf24" stroke-width="2.3"/>
