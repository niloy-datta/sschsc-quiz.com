<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="অঙ্গাণু: মাইটোকন্ড্রিয়া ও ক্লোরোপ্লাস্ট">
  <defs>
