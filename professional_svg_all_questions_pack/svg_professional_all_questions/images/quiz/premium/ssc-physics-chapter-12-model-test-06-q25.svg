<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="চলন্ত গাড়ির চাকার গতি">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">চলন্ত গাড়ির চাকার গতি</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">Rotation and periodic circular motion</text>
  <g filter="url(#glow)">
    <rect x="70" y="110" width="220" height="45" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="125" cy="160" r="35" fill="#0f172a" stroke="#22d3ee" stroke-width="4"/>
    <circle cx="235" cy="160" r="35" fill="#0f172a" stroke="#22d3ee" stroke-width="4"/>
    <line x1="125" y1="160" x2="125" y2="125" stroke="#fbbf24" stroke-width="3"/>
    <line x1="235" y1="160" x2="270" y2="160" stroke="#fbbf24" stroke-width="3"/>
    <path d="M95 160 A30 30 0 1 1 125 190" fill="none" stroke="#a3e635" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="180" y="75" text-anchor="middle" fill="#e0f2fe" font-size="13" font-family="Noto Sans Bengali, Arial">চাকার গতি</text>
    <text x="180" y="96" text-anchor="middle" fill="#bae6fd" font-size="10" font-family="Noto Sans Bengali, Arial">ঘূর্ণন + পর্যায়বৃত্ত গতি</text>
  </g>
  
</svg>