<svg width="100%" height="100%" viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="জৈব বিক্রিয়া উদ্দীপক">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="340" height="200" rx="14" fill="#ffffff" opacity=".035" stroke="#38bdf8" stroke-opacity=".24"/>
  <text x="180" y="28" text-anchor="middle" fill="#e0f2fe" font-size="12.5" font-weight="700" font-family="Noto Sans Bengali, Arial, sans-serif">জৈব বিক্রিয়া উদ্দীপক</text>
  <text x="180" y="44" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="Noto Sans Bengali, Arial, sans-serif">Alkyne hydration / oxidation pathway</text>
  <g filter="url(#glow)">
    <rect x="35" y="85" width="78" height="40" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="74" y="110" text-anchor="middle" fill="#e0f2fe" font-size="11" font-family="Arial">A</text>
    <rect x="145" y="85" width="88" height="40" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="189" y="110" text-anchor="middle" fill="#fef3c7" font-size="10" font-family="Arial">CH₃CH₂CHO</text>
    <rect x="265" y="85" width="60" height="40" rx="12" fill="#1e293b" stroke="#a3e635" stroke-width="2"/>
    <text x="295" y="110" text-anchor="middle" fill="#dcfce7" font-size="11" font-family="Arial">B</text>
    <line x1="113" y1="105" x2="145" y2="105" stroke="#67e8f9" stroke-width="2" marker-end="url(#arrow)" /><line x1="233" y1="105" x2="265" y2="105" stroke="#67e8f9" stroke-width="2" marker-end="url(#arrow)" />
    <text x="130" y="82" text-anchor="middle" fill="#bae6fd" font-size="8" font-family="Arial">H₂O/H₂SO₄,HgSO₄</text>
    <text x="249" y="82" text-anchor="middle" fill="#bae6fd" font-size="8" font-family="Arial">[O]</text>
    <text x="180" y="162" text-anchor="middle" fill="#f9a8d4" font-size="10" font-family="Noto Sans Bengali, Arial">জৈব বিক্রিয়া পথ</text>
  </g>
  
</svg>