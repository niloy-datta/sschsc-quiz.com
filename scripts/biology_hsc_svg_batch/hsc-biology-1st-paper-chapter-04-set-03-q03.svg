<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 360 220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <filter id="g">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#22c55e" flood-opacity=".55"/>
    </filter>
    <style>
      .bacteria{fill:#052e16;stroke:#86efac;stroke-width:3;filter:url(#g)}
      .chromosome{fill:none;stroke:#38bdf8;stroke-width:4;stroke-linecap:round}
      .plasmid{fill:none;stroke:#fde047;stroke-width:8;stroke-linecap:round}
      .dot{fill:#dcfce7}
      .label{font-family:Arial,sans-serif;font-size:19px;font-weight:900;fill:#fff}
    </style>
  </defs>
  <rect width="360" height="220" rx="18" fill="url(#bg)"/>
  <rect x="66" y="50" width="228" height="120" rx="60" class="bacteria"/>
  <path d="M102 112 C132 80 165 145 196 112 S248 80 270 112" class="chromosome"/>
  <ellipse cx="143" cy="136" rx="31" ry="21" class="plasmid"/>
  <circle cx="238" cy="78" r="3" class="dot"/>
  <circle cx="260" cy="142" r="3" class="dot"/>
  <text x="143" y="141" text-anchor="middle" class="label">P</text>
</svg>
