      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="18%" stop-color="#2563eb"/>
      <stop offset="36%" stop-color="#22c55e"/>
      <stop offset="58%" stop-color="#facc15"/>
      <stop offset="76%" stop-color="#f97316"/>
